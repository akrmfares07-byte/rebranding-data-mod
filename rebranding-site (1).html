<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#0a0a0a;
  --highlight:#d4a574;
  --highlight-dark:#b8915f;
  --text:#e8e8e8;
  --text-dim:#a8a8a8;
  --card-bg:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.08);
}
body{
  font-family:'Cairo','Work Sans',sans-serif;
  direction:rtl;
  background:var(--primary);
  min-height:100vh;
  color:var(--text);
  position:relative;
}
body::before{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background:radial-gradient(circle at 20% 50%,rgba(212,165,116,0.05) 0%,transparent 50%),
             radial-gradient(circle at 80% 80%,rgba(212,165,116,0.03) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#111;}
::-webkit-scrollbar-thumb{background:var(--highlight-dark);border-radius:3px;}
.card{transition:transform .2s,box-shadow .2s,border-color .2s;cursor:pointer;}
.card:hover{transform:translateY(-5px);box-shadow:0 20px 40px rgba(0,0,0,.5);border-color:var(--highlight)!important;}
.bh{transition:opacity .2s;}.bh:hover{opacity:.85;}
input,select,textarea{outline:none;font-family:'Cairo',sans-serif;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeInUp .6s ease forwards;}
</style>

<script type="text/babel">

const DEFAULT_DATA={

  ]
};

function daysLeft(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/86400000);}
function isExp(d){if(!d)return false;return new Date(d)<new Date();}

const G={
  inp:{width:"100%",padding:"0.65rem 1rem",borderRadius:6,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"var(--text)",marginBottom:"0.7rem",direction:"rtl",fontSize:"0.9rem",fontFamily:"'Cairo',sans-serif"},
  sel:{width:"100%",padding:"0.65rem 1rem",borderRadius:6,border:"1px solid rgba(255,255,255,0.1)",background:"#111",color:"var(--text)",marginBottom:"0.7rem",direction:"rtl",fontSize:"0.9rem",fontFamily:"'Cairo',sans-serif"},
  pBtn:{padding:"0.65rem 1.6rem",borderRadius:6,border:"none",cursor:"pointer",fontWeight:600,fontFamily:"'Cairo',sans-serif",background:"var(--highlight)",color:"#0a0a0a",letterSpacing:"0.03em"},
  ghostBtn:{padding:"0.65rem 1.6rem",borderRadius:6,cursor:"pointer",fontWeight:600,fontFamily:"'Cairo',sans-serif",background:"transparent",color:"var(--text-dim)",border:"1px solid rgba(255,255,255,0.1)"},
  modal:{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:"1rem"},
  modalBox:{background:"#0f0f0f",border:"1px solid rgba(212,165,116,0.15)",borderRadius:12,padding:"2rem",width:"100%",maxWidth:500,maxHeight:"88vh",overflowY:"auto"},
};

function Lbl({t}){return <label style={{fontSize:"0.75rem",letterSpacing:"0.08em",textTransform:"uppercase",color:"var(--text-dim)",display:"block",marginBottom:"0.3rem"}}>{t}</label>;}

function StatusBadge({s}){return <span style={{background:s==="نشط"?"rgba(74,222,128,0.12)":"rgba(255,255,255,0.06)",color:s==="نشط"?"#4ade80":"var(--text-dim)",padding:"0.15rem 0.6rem",borderRadius:4,fontSize:"0.68rem",fontWeight:600,border:s==="نشط"?"1px solid rgba(74,222,128,0.25)":"1px solid rgba(255,255,255,0.08)"}}>{s}</span>;}

function Tag({c}){return <span style={{display:"inline-block",padding:"0.15rem 0.55rem",borderRadius:4,fontSize:"0.68rem",fontWeight:500,background:"rgba(212,165,116,0.08)",color:"var(--highlight)",border:"1px solid rgba(212,165,116,0.15)",marginLeft:"0.3rem",marginBottom:"0.3rem"}}>{c}</span>;}

function LinkBtn({l}){
  return <a href={l.url} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{display:"inline-flex",alignItems:"center",gap:"0.25rem",padding:"0.25rem 0.7rem",borderRadius:4,fontSize:"0.75rem",fontWeight:500,background:"rgba(255,255,255,0.04)",border:"1px solid var(--border)",color:"var(--text-dim)",textDecoration:"none",marginLeft:"0.4rem",marginBottom:"0.3rem",transition:"all .2s"}}
    onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--highlight)";e.currentTarget.style.color="var(--highlight)";}}
    onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.color="var(--text-dim)";}}>
    {l.icon} {l.label}
  </a>;
}

function AccCard({acc,onClick}){
  return(
    <div className="card" onClick={onClick} style={{background:"var(--card-bg)",border:"1px solid var(--border)",borderRadius:8,overflow:"hidden"}}>
      {acc.coverImage?<img src={acc.coverImage} style={{width:"100%",height:148,objectFit:"cover"}} alt=""/>:<div style={{height:70,background:"linear-gradient(135deg,rgba(212,165,116,0.08),rgba(212,165,116,0.02))"}}/>}
      <div style={{padding:"1rem"}}>
        <div style={{display:"flex",alignItems:"flex-end",gap:"0.8rem",marginTop:acc.coverImage?-28:0,marginBottom:"0.6rem"}}>
          {acc.avatar&&<img src={acc.avatar} style={{width:52,height:52,borderRadius:"50%",border:"2px solid var(--highlight)",objectFit:"cover",flexShrink:0}} alt=""/>}
          <div style={{display:"flex",alignItems:"center",gap:"0.4rem",paddingBottom:4}}>
            <div style={{fontWeight:700,fontSize:"1rem",fontFamily:"'Playfair Display',serif"}}>{acc.name}</div>
            <StatusBadge s={acc.status}/>
          </div>
        </div>
        <div style={{fontSize:"0.82rem",color:"var(--text-dim)",lineHeight:1.6,marginBottom:"0.7rem"}}>{acc.description}</div>
        <div style={{marginBottom:"0.5rem"}}>{(acc.tags||[]).map(t=><Tag key={t} c={t}/>)}</div>
        <div>{(acc.links||[]).map(l=><LinkBtn key={l.label} l={l}/>)}</div>
      </div>
    </div>
  );
}

function OfferCard({offer,accName}){
  const exp=isExp(offer.expiryDate);const dl=daysLeft(offer.expiryDate);
  return(
    <div style={{background:"var(--card-bg)",border:"1px solid var(--border)",borderRadius:8,overflow:"hidden"}}>
      {exp&&<div style={{background:"rgba(220,38,38,0.8)",textAlign:"center",padding:"0.3rem",fontSize:"0.72rem",fontWeight:600,letterSpacing:"0.05em"}}>⏰ انتهى هذا العرض</div>}
      {offer.image&&<img src={offer.image} style={{width:"100%",height:138,objectFit:"cover"}} alt=""/>}
      <div style={{padding:"1rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"0.4rem"}}>
          <div style={{fontWeight:700,fontFamily:"'Playfair Display',serif",fontSize:"1rem"}}>{offer.title}</div>
          <span style={{background:"rgba(212,165,116,0.1)",color:"var(--highlight)",padding:"0.15rem 0.55rem",borderRadius:4,fontSize:"0.68rem",fontWeight:600,border:"1px solid rgba(212,165,116,0.2)",whiteSpace:"nowrap",marginRight:"0.5rem"}}>{offer.badge}</span>
        </div>
        {accName&&<div style={{fontSize:"0.73rem",color:"var(--highlight)",marginBottom:"0.4rem",letterSpacing:"0.05em"}}>· {accName}</div>}
        <div style={{fontSize:"0.82rem",color:"var(--text-dim)",lineHeight:1.6,marginBottom:"0.6rem"}}>{offer.description}</div>
        {offer.expiryDate&&!exp&&<div style={{fontSize:"0.73rem",color:dl<3?"#fbbf24":"#4ade80",marginBottom:"0.5rem",letterSpacing:"0.03em"}}>⏳ باقي {dl} يوم</div>}
        {offer.content&&(
          <div style={{marginBottom:"0.8rem",borderTop:"1px solid var(--border)",paddingTop:"0.8rem"}}>
            {offer.content.split("\n").map((line,i)=>{
              if(!line.trim())return <br key={i}/>;
              const isUrl=line.trim().startsWith("http");
              const isHeader=line.trim().startsWith("•")||line.trim().startsWith("-");
              const isTitle=line.includes(":")||line.trim().endsWith(":");
              if(isUrl)return <a key={i} href={line.trim()} target="_blank" rel="noreferrer" style={{display:"block",fontSize:"0.8rem",color:"var(--highlight)",marginBottom:"0.2rem",wordBreak:"break-all"}}>{line.trim()}</a>;
              if(isHeader)return <div key={i} style={{fontSize:"0.82rem",color:"var(--text)",fontWeight:600,marginBottom:"0.3rem",paddingRight:"0.3rem"}}>{line}</div>;
              return <div key={i} style={{fontSize:"0.8rem",color:"var(--text-dim)",lineHeight:1.6,marginBottom:"0.15rem"}}>{line}</div>;
            })}
          </div>
        )}
        {offer.link&&<a href={offer.link} target="_blank" rel="noreferrer" style={{display:"inline-flex",alignItems:"center",gap:"0.25rem",padding:"0.3rem 0.8rem",borderRadius:4,fontSize:"0.78rem",fontWeight:600,background:"rgba(212,165,116,0.08)",border:"1px solid rgba(212,165,116,0.2)",color:"var(--highlight)",textDecoration:"none"}}>🔗 اعرف أكتر</a>}
      </div>
    </div>
  );
}

function Tab({active,onClick,children}){
  return <button onClick={onClick} style={{padding:"0.5rem 1.3rem",borderRadius:0,border:"none",cursor:"pointer",fontWeight:600,fontSize:"0.82rem",fontFamily:"'Cairo',sans-serif",background:"transparent",color:active?"var(--highlight)":"var(--text-dim)",borderBottom:active?"2px solid var(--highlight)":"2px solid transparent",letterSpacing:"0.03em",transition:"all .2s"}}>{children}</button>;
}

function Spinner(){
  return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"70vh",flexDirection:"column",gap:"1rem"}}>
    <div style={{width:40,height:40,border:"2px solid rgba(212,165,116,0.2)",borderTop:"2px solid var(--highlight)",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
    <div style={{color:"var(--text-dim)",fontSize:"0.85rem",letterSpacing:"0.1em",textTransform:"uppercase"}}>جاري التحميل</div>
  </div>;
}

        const rec=d.record;

        else{setAccounts(DEFAULT_DATA.accounts);setOffers(DEFAULT_DATA.offers);}

      .finally(()=>setLoading(false));

  function tryAdmin(){if(pass===ADMIN_PASS){setAdminOk(true);setView("admin");setPassErr(false);}else setPassErr(true);}

  function saveAcc(){const obj={...aForm,id:eAId||Date.now(),tags:aForm.tags.split(",").map(t=>t.trim()).filter(Boolean),links:links.filter(l=>l.label&&l.url)};const n=eAId?accounts.map(a=>a.id===eAId?obj:a):[...accounts,obj];setAccounts(n);save(n,offers);setShowAF(false);}

          </div>
          <div style={tabBar}>
            <Tab active={adminTab==="accounts"} onClick={()=>setAdminTab("accounts")}>📁 الأكونتات</Tab>

          {adminTab==="accounts"&&(

              <div style={{display:"grid",gap:"0.7rem"}}>
                {accounts.map(acc=>(
                  <div key={acc.id} style={{background:"var(--card-bg)",border:"1px solid var(--border)",borderRadius:8,display:"flex",alignItems:"center",gap:"1rem",padding:"0.9rem 1rem"}}>
                    {acc.avatar&&<img src={acc.avatar} style={{width:46,height:46,borderRadius:"50%",objectFit:"cover",border:"1px solid rgba(212,165,116,0.2)"}} alt=""/>}
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontFamily:"'Playfair Display',serif"}}>{acc.name}</div>

                    </div>
                    <StatusBadge s={acc.status}/>
                    <button className="bh" onClick={()=>openAF(acc)} style={{padding:"0.38rem 0.8rem",borderRadius:4,border:"1px solid var(--border)",cursor:"pointer",fontWeight:600,fontSize:"0.78rem",fontFamily:"'Cairo',sans-serif",background:"rgba(255,255,255,0.04)",color:"var(--text-dim)"}}>✏️ تعديل</button>
                    <button className="bh" onClick={()=>delAcc(acc.id)} style={{padding:"0.38rem 0.8rem",borderRadius:4,border:"1px solid rgba(239,68,68,0.2)",cursor:"pointer",fontWeight:600,fontSize:"0.78rem",fontFamily:"'Cairo',sans-serif",background:"rgba(239,68,68,0.06)",color:"#f87171"}}>🗑️</button>

                      <button className="bh" onClick={()=>openOF(o)} style={{padding:"0.38rem 0.8rem",borderRadius:4,border:"1px solid var(--border)",cursor:"pointer",fontWeight:600,fontSize:"0.78rem",fontFamily:"'Cairo',sans-serif",background:"rgba(255,255,255,0.04)",color:"var(--text-dim)"}}>✏️ تعديل</button>
                      <button className="bh" onClick={()=>delOff(o.id)} style={{padding:"0.38rem 0.8rem",borderRadius:4,border:"1px solid rgba(239,68,68,0.2)",cursor:"pointer",fontWeight:600,fontSize:"0.78rem",fontFamily:"'Cairo',sans-serif",background:"rgba(239,68,68,0.06)",color:"#f87171"}}>🗑️</button>

            </select>
            {[["title","عنوان العرض","text","مثال: عرض رمضان"],["image","صورة العرض (رابط)","text","https://..."],["link","رابط العرض","text","https://..."],["expiryDate","تاريخ الانتهاء","date",""],["badge","الباج","text","جديد، محدود"]].map(([k,l,t,p])=>(
              <div key={k}><Lbl t={l}/><input type={t} placeholder={p} value={oForm[k]} onChange={e=>setOForm({...oForm,[k]:e.target.value})} style={G.inp}/></div>
            ))}
            <Lbl t="الوصف القصير (اختياري)"/>
            <textarea value={oForm.description} onChange={e=>setOForm({...oForm,description:e.target.value})} style={{...G.inp,minHeight:55,resize:"vertical"}}/>
            <Lbl t="المحتوى الكامل (منيو، أسعار، عنوان، أرقام تواصل...)"/>
            <textarea placeholder={"مثال:\nللطلبات: 01031751111\nالعنوان: منطقة المطاعم - بوابة ٦\nhttps://maps.app.goo.gl/...\n\n• صينية ولي العهد - ١٢٩٩ ج\nتكفي ٣ أفراد - أرز + فراخ + كفتة"} value={oForm.content||""} onChange={e=>setOForm({...oForm,content:e.target.value})} style={{...G.inp,minHeight:180,resize:"vertical",lineHeight:1.7}}/>
            <div style={{display:"flex",gap:"0.5rem",justifyContent:"flex-end"}}>
              <button onClick={()=>setShowOF(false)} style={G.ghostBtn}>إلغاء</button>
              <button className="bh" onClick={saveOff} style={G.pBtn}>💾 حفظ</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
