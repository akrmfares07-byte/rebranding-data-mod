<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--primary:#0a0a0a;--hl:#d4a574;--hld:#b8915f;--text:#e8e8e8;--dim:#a8a8a8;--card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);}
body{font-family:'Cairo','Work Sans',sans-serif;direction:rtl;background:var(--primary);min-height:100vh;color:var(--text);position:relative;}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 20% 50%,rgba(212,165,116,0.05) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(212,165,116,0.03) 0%,transparent 50%);pointer-events:none;z-index:0;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:#111;}::-webkit-scrollbar-thumb{background:var(--hld);border-radius:3px;}
.card{transition:transform .2s,box-shadow .2s,border-color .2s;cursor:pointer;}
.card:hover{transform:translateY(-3px);box-shadow:0 16px 36px rgba(0,0,0,.5);border-color:var(--hl)!important;}
.bh{transition:opacity .2s;}.bh:hover{opacity:.82;}
input,select,textarea{outline:none;font-family:'Cairo',sans-serif;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.55}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.upbtn{display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;padding:.52rem 1rem;border-radius:6px;border:1.5px dashed rgba(212,165,116,0.32);background:rgba(212,165,116,0.03);color:var(--hl);cursor:pointer;font-family:'Cairo',sans-serif;font-size:.8rem;font-weight:600;margin-bottom:.5rem;transition:all .2s;}
.upbtn:hover{border-color:var(--hl);background:rgba(212,165,116,0.08);}
.pbar{width:100%;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-bottom:.55rem;overflow:hidden;}
.pbar-in{height:100%;background:var(--hl);transition:width .3s;}
.cpbtn{display:inline-flex;align-items:center;gap:.3rem;padding:.28rem .75rem;border-radius:4px;border:1px solid rgba(212,165,116,0.22);background:rgba(212,165,116,0.05);color:var(--hl);cursor:pointer;font-family:'Cairo',sans-serif;font-size:.72rem;font-weight:600;transition:all .2s;}
.cpbtn:hover{border-color:var(--hl);background:rgba(212,165,116,0.12);}
.cpbtn.done{border-color:#4ade80;color:#4ade80;background:rgba(74,222,128,0.07);}
.gimg{width:100%;height:110px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:zoom-in;transition:transform .2s,border-color .2s;}
.gimg:hover{transform:scale(1.02);border-color:var(--hl);}
.exp-urgent{animation:pulse 1.5s ease-in-out infinite;}
/* Search */
.search-wrap{position:relative;flex:1;max-width:340px;}
.search-wrap input{width:100%;padding:0.42rem 0.9rem 0.42rem 2.2rem;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--text);font-family:'Cairo',sans-serif;font-size:0.82rem;direction:rtl;transition:border-color .2s;}
.search-wrap input:focus{border-color:rgba(212,165,116,0.4);}
.search-icon{position:absolute;left:0.7rem;top:50%;transform:translateY(-50%);color:var(--dim);font-size:0.8rem;pointer-events:none;}
/* Explain FAB */
.explain-fab{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:0.5rem;padding:0.52rem 1.3rem;border-radius:30px;border:1px solid rgba(212,165,116,0.35);background:rgba(10,10,10,0.92);color:var(--hl);cursor:pointer;font-family:'Cairo',sans-serif;font-size:0.82rem;font-weight:700;backdrop-filter:blur(12px);box-shadow:0 4px 24px rgba(0,0,0,0.5);transition:all .2s;white-space:nowrap;}
.explain-fab:hover{background:rgba(212,165,116,0.12);border-color:var(--hl);}
/* Explain modal sections */
.explain-section{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:1rem;margin-bottom:0.8rem;}
.explain-section h3{color:var(--hl);font-size:0.82rem;font-weight:700;margin-bottom:0.6rem;letter-spacing:0.06em;}
.explain-section p,.explain-section li{font-size:0.82rem;color:var(--dim);line-height:1.75;}
.explain-section ul{padding-right:1.2rem;}
.explain-section li{margin-bottom:0.3rem;}
/* Undo toast */
.undo-toast{position:fixed;bottom:4.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid rgba(212,165,116,0.3);color:var(--text);padding:0.55rem 1.1rem;border-radius:8px;font-family:'Cairo',sans-serif;font-size:0.8rem;display:flex;align-items:center;gap:0.7rem;z-index:998;animation:slideUp .25s ease;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
/* Responsive */
@media(max-width:600px){
  .nav-title{display:none;}
  .hero-stats{gap:1rem!important;}
  .grid-cards{grid-template-columns:1fr!important;}
  .search-wrap{max-width:100%;}
  .filters-row{flex-direction:column;align-items:stretch!important;}
}

/* Landing Page */
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
.made-by{font-family:'Playfair Display',serif;font-size:0.8rem;font-weight:600;background:linear-gradient(90deg,#b8915f,#d4a574,#f0dbb5,#d4a574,#b8915f);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.1em;animation:shimmer 3s linear infinite;}

@keyframes rotateSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 30px rgba(212,165,116,0.2),0 0 60px rgba(212,165,116,0.05)}50%{box-shadow:0 0 50px rgba(212,165,116,0.35),0 0 100px rgba(212,165,116,0.1)}}
.land-logo{animation:glowPulse 3s ease-in-out infinite;}
.land-title{animation:floatUp .7s ease both;}
.land-sub{animation:floatUp .7s .15s ease both;}
.land-stats{animation:floatUp .7s .25s ease both;}
.land-btns{animation:floatUp .7s .35s ease both;}
.land-btn-primary{padding:0.85rem 2.2rem;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-family:'Cairo',sans-serif;font-size:1rem;background:var(--hl);color:#0a0a0a;transition:all .25s;letter-spacing:0.04em;}
.land-btn-primary:hover{background:var(--hld);transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,165,116,0.35);}
.land-btn-ghost{padding:0.85rem 2.2rem;border-radius:8px;cursor:pointer;font-weight:600;font-family:'Cairo',sans-serif;font-size:1rem;background:transparent;color:var(--dim);border:1px solid rgba(255,255,255,0.12);transition:all .25s;}
.land-btn-ghost:hover{border-color:rgba(212,165,116,0.4);color:var(--hl);transform:translateY(-2px);}
/* Decorative ring */
.land-ring{position:absolute;border-radius:50%;border:1px solid rgba(212,165,116,0.07);pointer-events:none;}

</style>

<body>
<div id="root"></div>
<script>window.LOGO_URL="https://raw.githubusercontent.com/FaresAkramm/photo/main/re-branding.jpg";</script>
<script type="text/babel">
const{useState,useEffect,useRef,useMemo,useCallback}=React;
const ADMIN="fares2388";
const CATS=["كل شيء","مطاعم","أخرى"];
const LOGO=window.LOGO_URL;

/* ── Download helpers ── */
async function downloadImg(url,filename){
  try{const res=await fetch(url);const blob=await res.blob();const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);}
  catch(e){window.open(url,"_blank");}
}
async function downloadAllAsZip(urls,accName,setZipping){
  setZipping(true);
  try{
    const zip=new JSZip();const folder=zip.folder(accName||"album");
    for(let i=0;i<urls.length;i++){try{const res=await fetch(urls[i]);const blob=await res.blob();const ext=blob.type.includes("png")?"png":"jpg";folder.file(`${i+1}.${ext}`,blob);}catch(e){}}
    const content=await zip.generateAsync({type:"blob"});
    const a=document.createElement("a");a.href=URL.createObjectURL(content);a.download=`${accName||"album"}.zip`;a.click();URL.revokeObjectURL(a.href);
  }catch(e){alert("فشل التنزيل: "+e.message);}
  setZipping(false);
}

/* ── Cloudinary ── */
const CLD_CLOUD="diepkkeyu",CLD_PRESET="rebranding";
async function uploadToCloudinary(file){
  const fd=new FormData();fd.append("file",file);fd.append("upload_preset",CLD_PRESET);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CLD_CLOUD}/image/upload`,{method:"POST",body:fd});
  if(!res.ok)throw new Error("فشل رفع الصورة");
  return (await res.json()).secure_url;
}

function daysLeft(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/86400000);}
function isExp(d){if(!d)return false;return new Date(d)<new Date();}

const S={
  inp:{width:"100%",padding:"0.58rem 1rem",borderRadius:6,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"var(--text)",marginBottom:"0.6rem",direction:"rtl",fontSize:"0.88rem",fontFamily:"'Cairo',sans-serif"},
  sel:{width:"100%",padding:"0.58rem 1rem",borderRadius:6,border:"1px solid rgba(255,255,255,0.1)",background:"#111",color:"var(--text)",marginBottom:"0.6rem",direction:"rtl",fontSize:"0.88rem",fontFamily:"'Cairo',sans-serif"},
  pBtn:{padding:"0.6rem 1.5rem",borderRadius:6,border:"none",cursor:"pointer",fontWeight:700,fontFamily:"'Cairo',sans-serif",background:"var(--hl)",color:"#0a0a0a"},
  ghost:{padding:"0.6rem 1.5rem",borderRadius:6,cursor:"pointer",fontWeight:600,fontFamily:"'Cairo',sans-serif",background:"transparent",color:"var(--dim)",border:"1px solid rgba(255,255,255,0.1)"},
  modal:{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:"1rem"},
  box:{background:"#0f0f0f",border:"1px solid rgba(212,165,116,0.15)",borderRadius:12,padding:"1.8rem",width:"100%",maxWidth:520,maxHeight:"90vh",overflowY:"auto"},
};

function Lbl({t}){return <label style={{fontSize:"0.7rem",letterSpacing:"0.08em",textTransform:"uppercase",color:"var(--dim)",display:"block",marginBottom:"0.28rem"}}>{t}</label>;}
function Badge({s}){return <span style={{background:s==="نشط"?"rgba(74,222,128,0.1)":"rgba(255,255,255,0.05)",color:s==="نشط"?"#4ade80":"var(--dim)",padding:"0.1rem 0.5rem",borderRadius:4,fontSize:"0.62rem",fontWeight:700}}>{s}</span>;}
function Tag({c}){return <span style={{display:"inline-block",padding:"0.1rem 0.48rem",borderRadius:4,fontSize:"0.62rem",fontWeight:500,background:"rgba(212,165,116,0.08)",color:"var(--hl)",border:"1px solid rgba(212,165,116,0.14)",marginLeft:"0.28rem",marginBottom:"0.28rem"}}>{c}</span>;}
function Lnk({l}){return <a href={l.url} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{display:"inline-flex",alignItems:"center",gap:"0.2rem",padding:"0.2rem 0.6rem",borderRadius:4,fontSize:"0.7rem",fontWeight:500,background:"rgba(255,255,255,0.04)",border:"1px solid var(--border)",color:"var(--dim)",textDecoration:"none",marginLeft:"0.32rem",marginBottom:"0.28rem"}}>{l.icon} {l.label}</a>;}

function CopyBtn({text,label,small}){
  const[ok,setOk]=useState(false);
  function copy(e){e&&e.stopPropagation();navigator.clipboard.writeText(text).then(()=>{setOk(true);setTimeout(()=>setOk(false),2000);});}
  const sz=small?{padding:"0.18rem 0.55rem",fontSize:"0.65rem"}:{};
  return <button className={"cpbtn"+(ok?" done":"")} style={sz} onClick={copy}>{ok?"✅ تم":("📋 "+(label||"كوبي"))}</button>;
}

function ImgUp({label,cur,onDone}){
  const[prev,setPrev]=useState(cur||"");const[pct,setPct]=useState(0);const[busy,setBusy]=useState(false);const fref=useRef();
  async function pick(e){
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();reader.onload=ev=>setPrev(ev.target.result);reader.readAsDataURL(f);
    setBusy(true);setPct(30);
    try{const url=await uploadToCloudinary(f);setPct(100);setPrev(url);onDone(url);}catch(err){alert("فشل الرفع: "+err.message);}
    setBusy(false);setPct(0);
  }
  return(
    <div>
      <Lbl t={label}/>
      {prev&&<img src={prev} style={{width:"100%",height:80,objectFit:"cover",borderRadius:6,marginBottom:5,border:"1px solid var(--border)"}} alt=""/>}
      {busy&&<div className="pbar"><div className="pbar-in" style={{width:pct+"%"}}/></div>}
      <label className="upbtn" style={{opacity:busy?0.6:1}}>
        {busy?"⏳ جاري الرفع...":"☁️ ارفع صورة"}
        <input ref={fref} type="file" accept="image/*" style={{display:"none"}} onChange={pick} disabled={busy}/>
      </label>
      <div style={{textAlign:"center",fontSize:"0.68rem",color:"var(--dim)",margin:"-3px 0 4px"}}>أو رابط مباشر</div>
      <input placeholder="https://..." value={prev} onChange={e=>{setPrev(e.target.value);onDone(e.target.value);}} style={S.inp}/>
    </div>
  );
}

function GalleryUp({images,onChange}){
  const[busy,setBusy]=useState(false);const[progress,setProgress]=useState("");const fref=useRef();
  async function pick(e){
    const files=[...e.target.files];if(!files.length)return;
    setBusy(true);const newUrls=[];
    for(let i=0;i<files.length;i++){setProgress(`رفع ${i+1} من ${files.length}...`);try{const url=await uploadToCloudinary(files[i]);newUrls.push(url);}catch(err){}}
    onChange([...(images||[]),...newUrls]);setBusy(false);setProgress("");fref.current.value="";
  }
  function remove(i){onChange((images||[]).filter((_,idx)=>idx!==i));}
  return(
    <div>
      <Lbl t="صور المنيو / الألبوم"/>
      {(images||[]).length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.4rem",marginBottom:"0.6rem"}}>
          {(images||[]).map((url,i)=>(
            <div key={i} style={{position:"relative"}}>
              <img src={url} className="gimg" alt=""/>
              <button onClick={()=>remove(i)} style={{position:"absolute",top:3,left:3,background:"rgba(239,68,68,0.85)",border:"none",color:"#fff",width:20,height:20,borderRadius:"50%",cursor:"pointer",fontSize:"0.7rem",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>
          ))}
        </div>
      )}
      {busy&&<div style={{fontSize:"0.75rem",color:"var(--hl)",marginBottom:"0.4rem",textAlign:"center"}}>☁️ {progress}</div>}
      <label className="upbtn" style={{opacity:busy?0.6:1}}>
        {busy?progress:"📁 ارفع صور المنيو (متعددة)"}
        <input ref={fref} type="file" accept="image/*" multiple style={{display:"none"}} onChange={pick} disabled={busy}/>
      </label>
    </div>
  );
}

function Spin({msg}){return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"70vh",flexDirection:"column",gap:"1rem"}}><div style={{width:36,height:36,border:"2px solid rgba(212,165,116,0.2)",borderTop:"2px solid var(--hl)",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/><div style={{color:"var(--dim)",fontSize:"0.8rem",letterSpacing:"0.1em"}}>{msg}</div></div>;}
function Tab({on,click,ch}){return <button onClick={click} style={{padding:"0.45rem 1.1rem",border:"none",cursor:"pointer",fontWeight:600,fontSize:"0.78rem",fontFamily:"'Cairo',sans-serif",background:"transparent",color:on?"var(--hl)":"var(--dim)",borderBottom:on?"2px solid var(--hl)":"2px solid transparent",transition:"all .2s"}}>{ch}</button>;}

function GalleryView({images,accName,onZoom}){
  const[zipping,setZipping]=useState(false);
  return(
    <div style={{marginBottom:"0.9rem"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"0.5rem"}}>
        <div style={{fontWeight:600,fontSize:"0.72rem",letterSpacing:"0.08em",textTransform:"uppercase",color:"var(--dim)"}}>📸 المنيو / الألبوم ({images.length} صورة)</div>
        <button onClick={e=>{e.stopPropagation();downloadAllAsZip(images,accName,setZipping);}} disabled={zipping}
          style={{display:"inline-flex",alignItems:"center",gap:"0.3rem",padding:"0.26rem 0.7rem",borderRadius:4,border:"1px solid rgba(212,165,116,0.3)",background:"rgba(212,165,116,0.08)",color:"var(--hl)",cursor:"pointer",fontSize:"0.7rem",fontWeight:600,fontFamily:"'Cairo',sans-serif",opacity:zipping?0.6:1}}>
          {zipping?"⏳ جاري...":"📦 تنزيل الكل ZIP"}
        </button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.4rem"}}>
        {images.map((url,i)=>(
          <div key={i} style={{position:"relative"}}>
            <img src={url} className="gimg" onClick={e=>{e.stopPropagation();onZoom(url);}} alt=""/>
            <button onClick={e=>{e.stopPropagation();downloadImg(url,`${accName||"img"}_${i+1}.jpg`);}}
              style={{position:"absolute",bottom:3,left:3,background:"rgba(0,0,0,0.75)",border:"1px solid rgba(255,255,255,0.25)",color:"#fff",width:26,height:26,borderRadius:4,cursor:"pointer",fontSize:"0.78rem",display:"flex",alignItems:"center",justifyContent:"center"}}>⬇</button>
          </div>
        ))}
      </div>
    </div>
  );
}

function AccCard({a,onClick,onShare}){
  return(
    <div className="card" onClick={onClick} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,overflow:"hidden",animation:"fadeIn .3s ease"}}>
      {a.coverImage?<img src={a.coverImage} style={{width:"100%",height:140,objectFit:"cover"}} alt=""/>:<div style={{height:52,background:"linear-gradient(135deg,rgba(212,165,116,0.07),transparent)"}}/>}
      <div style={{padding:"0.9rem"}}>
        <div style={{display:"flex",alignItems:"flex-end",gap:"0.7rem",marginTop:a.coverImage?-24:0,marginBottom:"0.55rem"}}>
          {a.avatar&&<img src={a.avatar} style={{width:48,height:48,borderRadius:"50%",border:"2px solid var(--hl)",objectFit:"cover",flexShrink:0}} alt=""/>}
          <div style={{flex:1,display:"flex",alignItems:"center",gap:"0.35rem",paddingBottom:2}}>
            <span style={{fontWeight:700,fontSize:"0.95rem",fontFamily:"'Playfair Display',serif"}}>{a.name}</span>
            <Badge s={a.status}/>
          </div>
          {/* Share button */}
          <button onClick={e=>onShare(a,e)} title="شارك الأكونت"
            style={{flexShrink:0,background:"rgba(212,165,116,0.06)",border:"1px solid rgba(212,165,116,0.18)",color:"var(--hl)",width:28,height:28,borderRadius:6,cursor:"pointer",fontSize:"0.78rem",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s",marginBottom:2}}
            onMouseEnter={e=>e.currentTarget.style.background="rgba(212,165,116,0.15)"}
            onMouseLeave={e=>e.currentTarget.style.background="rgba(212,165,116,0.06)"}>
            🔗
          </button>
        </div>
        <div style={{fontSize:"0.78rem",color:"var(--dim)",lineHeight:1.6,marginBottom:"0.55rem"}}>{a.description}</div>
        <div style={{marginBottom:"0.4rem"}}>{(a.tags||[]).map(t=><Tag key={t} c={t}/>)}</div>
        <div style={{marginBottom:(a.fixedReply||a.timesReply||a.contactReply)?"0.6rem":"0"}}>{(a.links||[]).map(l=><Lnk key={l.label} l={l}/>)}</div>
        {(a.fixedReply||a.timesReply||a.contactReply)&&(
          <div onClick={e=>e.stopPropagation()} style={{display:"flex",gap:"0.3rem",flexWrap:"wrap",borderTop:"1px solid var(--border)",paddingTop:"0.55rem"}}>
            {a.fixedReply&&<CopyBtn text={a.fixedReply} label="الرد الثابت" small/>}
            {a.timesReply&&<CopyBtn text={a.timesReply} label="المواعيد" small/>}
            {a.contactReply&&<CopyBtn text={a.contactReply} label="التواصل" small/>}
          </div>
        )}
      </div>
    </div>
  );
}

function OCard({o,accName}){
  const e=isExp(o.expiryDate),dl=daysLeft(o.expiryDate),urgent=!e&&dl!==null&&dl<=3;

/* ══════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════ */
function App(){
  const[fbOk,setFbOk]=useState(!!window.__fbReady);
  const[accs,setAccs]=useState([]);
  const[offs,setOffs]=useState([]);
  const[load,setLoad]=useState(true);
  const[busy,setBusy]=useState(false);
  const[toast,setToast]=useState("");
  const[view,setView]=useState("landing");
  const[admin,setAdmin]=useState(false);
  const[pw,setPw]=useState("");
  const[pwErr,setPwErr]=useState(false);
  const[selA,setSelA]=useState(null);
  const[lightImg,setLightImg]=useState(null);
  const[cat,setCat]=useState("كل شيء");
  const[ptab,setPtab]=useState("accs");
  const[atab,setAtab]=useState("accs");
  const[search,setSearch]=useState("");
  const[sort,setSort]=useState("newest");
  const[showExplain,setShowExplain]=useState(false);
  const[undoData,setUndoData]=useState(null); // {type,id,data,timer}

  const EA={name:"",category:"مطاعم",avatar:"",coverImage:"",description:"",tags:"",status:"نشط",joinedDate:"",fixedReply:"",timesReply:"",contactReply:"",galleryImages:[]};
  const EO={accountId:"",title:"",description:"",content:"",image:"",link:"",expiryDate:"",badge:"جديد"};
  const[showAF,setShowAF]=useState(false);const[showOF,setShowOF]=useState(false);
  const[af,setAf]=useState(EA);const[of,setOf]=useState(EO);
  const[eAid,setEAid]=useState(null);const[eOid,setEOid]=useState(null);
  const[lnks,setLnks]=useState([{label:"",url:"",icon:""}]);

  useEffect(()=>{
    if(window.__fbReady){setFbOk(true);return;}
    window.addEventListener("fbReady",()=>setFbOk(true),{once:true});
  },[]);

  useEffect(()=>{
    if(!fbOk)return;
    const fb=window.__fb;
    const u1=fb.onSnapshot(fb.collection(fb.db,"accounts"),s=>{
      const list=s.docs.map(d=>({...d.data(),id:d.id}));
      setAccs(list);
      setLoad(false);
      // handle deep link via hash
      const hash=decodeURIComponent(window.location.hash.slice(1));
      if(hash){
        const found=list.find(a=>a.id===hash||a.name===hash);
        if(found){setSelA(found);setView("pub");}
      }
    });
    const u2=fb.onSnapshot(fb.collection(fb.db,"offers"),s=>{setOffs(s.docs.map(d=>({...d.data(),id:d.id})));});
    return()=>{u1();u2();};
  },[fbOk]);

  function msg(t){setToast(t);setTimeout(()=>setToast(""),2500);}

  function shareAcc(a,e){
    e.stopPropagation();
    const url=window.location.href.split("#")[0]+"#"+encodeURIComponent(a.id);
    navigator.clipboard.writeText(url).then(()=>msg("🔗 تم كوبي لينك الأكونت!"));
  }

  /* ── Undo system ── */
  function scheduleDelete(type,id,data){
    // show undo toast for 5s, then actually delete
    if(undoData?.timer)clearTimeout(undoData.timer);
    const timer=setTimeout(async()=>{
      try{await window.__fb.deleteDoc(window.__fb.doc(window.__fb.db,type,id));msg("🗑️ تم الحذف نهائياً");}
      catch(e){alert(e.message);}
      setUndoData(null);
    },5000);
    setUndoData({type,id,data,timer});
  }

  async function undoDelete(){
    if(!undoData)return;
    clearTimeout(undoData.timer);
    try{
      const fb=window.__fb;
      await fb.setDoc(fb.doc(fb.db,undoData.type,undoData.id),undoData.data);
      msg("↩️ تم الاسترجاع");
    }catch(e){alert(e.message);}
    setUndoData(null);
  }

  function delAcc(id){
    const data=accs.find(a=>a.id===id);
    if(!data)return;
    scheduleDelete("accounts",id,data);
    msg("سيتم حذف الأكونت...");
  }
  function delOff(id){
    const data=offs.find(o=>o.id===id);
    if(!data)return;
    scheduleDelete("offers",id,data);
    msg("سيتم حذف العرض...");
  }

  /* ── Export JSON ── */
  function exportJSON(){
    const data={accounts:accs,offers:offs,exportedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`rebranding-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href);
    msg("✅ تم تصدير البيانات");
  }

  /* ── Filtered data ── */
  const fAccs=useMemo(()=>{
    let list=cat==="كل شيء"?accs:accs.filter(a=>a.category===cat);
    if(search.trim()){const q=search.trim().toLowerCase();list=list.filter(a=>(a.name||"").toLowerCase().includes(q)||(a.description||"").toLowerCase().includes(q)||(a.tags||[]).some(t=>t.toLowerCase().includes(q)));}
    if(sort==="alpha")list=[...list].sort((a,b)=>(a.name||"").localeCompare(b.name||"","ar"));
    else if(sort==="oldest")list=[...list].sort((a,b)=>a.id-b.id);
    return list;
  },[accs,cat,search,sort]);

  const fOffs=useMemo(()=>{
    if(!search.trim())return offs;
    const q=search.trim().toLowerCase();
    return offs.filter(o=>{
      const accName=(accs.find(a=>a.id===o.accountId)?.name||"").toLowerCase();
      return (o.title||"").toLowerCase().includes(q)||(o.description||"").toLowerCase().includes(q)||accName.includes(q);
    });
  },[offs,accs,search]);

  const urgentCount=offs.filter(o=>!isExp(o.expiryDate)&&daysLeft(o.expiryDate)!==null&&daysLeft(o.expiryDate)<=3).length;

  function openAcc(a){
    setSelA(a);
    window.location.hash=encodeURIComponent(a.id);
  }
  function closeAcc(){
    setSelA(null);
    history.pushState("","",window.location.pathname+window.location.search);
  }
  function openAF(a=null){
    if(a){setAf({...a,tags:(a.tags||[]).join(", "),fixedReply:a.fixedReply||"",timesReply:a.timesReply||"",contactReply:a.contactReply||"",galleryImages:a.galleryImages||[]});setLnks(a.links?.length?a.links:[{label:"",url:"",icon:""}]);setEAid(a.id);}
    else{setAf(EA);setLnks([{label:"",url:"",icon:""}]);setEAid(null);}
    setShowAF(true);
  }
  async function saveAcc(){
    setBusy(true);const fb=window.__fb;const id=eAid||String(Date.now());
    try{await fb.setDoc(fb.doc(fb.db,"accounts",id),{...af,tags:af.tags.split(",").map(t=>t.trim()).filter(Boolean),links:lnks.filter(l=>l.label&&l.url),updatedAt:new Date().toISOString()});msg("✅ تم الحفظ");setShowAF(false);}
    catch(e){alert(e.message);}
    setBusy(false);
  }

  function openOF(o=null){if(o){setOf(o);setEOid(o.id);}else{setOf(EO);setEOid(null);}setShowOF(true);}
  async function saveOff(){
    setBusy(true);const fb=window.__fb;const id=eOid||String(Date.now());
    try{await fb.setDoc(fb.doc(fb.db,"offers",id),{...of,updatedAt:new Date().toISOString()});msg("✅ تم الحفظ");setShowOF(false);}
    catch(e){alert(e.message);}
    setBusy(false);
  }

      {/* NAV */}

      {/* PUBLIC */}
      {view==="pub"&&(

            <div style={{width:110,height:110,borderRadius:"50%",margin:"0 auto 1.1rem",overflow:"hidden",border:"2px solid rgba(212,165,116,0.4)",boxShadow:"0 0 30px rgba(212,165,116,0.15)"}}>
              <img src={LOGO} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="logo"/>
            </div>
            <div style={{fontSize:"2.2rem",fontWeight:700,fontFamily:"'Playfair Display',serif",marginBottom:"0.25rem"}}>Rebranding</div>
            <div style={{fontSize:"0.72rem",color:"var(--hl)",letterSpacing:"0.3em",textTransform:"uppercase",marginBottom:"1rem"}}>marketing agency · data mod</div>
            <div className="hero-stats" style={{display:"flex",justifyContent:"center",gap:"2rem"}}>

              <div style={{width:1,background:"var(--border)"}}/>
              <div style={{textAlign:"center"}}><div style={{fontSize:"1.7rem",fontWeight:700,color:"var(--hl)",fontFamily:"'Playfair Display',serif"}}>{offs.filter(o=>!isExp(o.expiryDate)).length}</div><div style={{fontSize:"0.65rem",color:"var(--dim)",letterSpacing:"0.15em",textTransform:"uppercase"}}>عرض نشط</div></div>
            </div>
          </div>

          <div style={TB}>
            <Tab on={ptab==="accs"} click={()=>setPtab("accs")} ch="📁 الأكونتات"/>
            <Tab on={ptab==="offs"} click={()=>setPtab("offs")} ch={`🎁 العروض${urgentCount>0?" ⚠️":""}`}/>
          </div>

          <div className="filters-row" style={{display:"flex",gap:"0.6rem",alignItems:"center",marginBottom:"1.2rem",flexWrap:"wrap"}}>

              <span className="search-icon">🔍</span>
              <input placeholder={ptab==="accs"?"ابحث عن أكونت...":"ابحث عن عرض..."} value={search} onChange={e=>setSearch(e.target.value)}/>

            {ptab==="accs"&&(
              <select value={sort} onChange={e=>setSort(e.target.value)} style={{padding:"0.38rem 0.75rem",borderRadius:6,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"var(--dim)",fontFamily:"'Cairo',sans-serif",fontSize:"0.78rem",cursor:"pointer"}}>

                <option value="oldest">الأقدم أولاً</option>
                <option value="alpha">أبجدي</option>
              </select>

          {ptab==="accs"&&<>
            <div style={{display:"flex",gap:"0.4rem",flexWrap:"wrap",marginBottom:"1.3rem"}}>

            {fAccs.length===0&&<div style={{textAlign:"center",color:"var(--dim)",padding:"3rem"}}>🔍 لا توجد نتائج</div>}
            <div className="grid-cards" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:"1.1rem"}}>

          {ptab==="offs"&&<>

        </div>

      {/* LOGIN */}
      {view==="login"&&(

            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.15rem",marginBottom:"1.4rem"}}>Admin Access</div>

          </div>
        </div>

          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1.8rem",flexWrap:"wrap",gap:"0.6rem"}}>
            <span style={{fontSize:"0.78rem",color:"var(--hl)",letterSpacing:"0.1em",textTransform:"uppercase"}}>لوحة الإدارة</span>
            <div style={{display:"flex",gap:"0.5rem",alignItems:"center"}}>

          <div style={TB}>
            <Tab on={atab==="accs"} click={()=>setAtab("accs")} ch={`📁 الأكونتات (${accs.length})`}/>
            <Tab on={atab==="offs"} click={()=>setAtab("offs")} ch={`🎁 العروض (${offs.length})${urgentCount>0?" ⚠️"+urgentCount:""}`}/>
          </div>
          {atab==="accs"&&<>
            <button className="bh" onClick={()=>openAF()} style={{...S.pBtn,marginBottom:"1.1rem"}}>+ أضف أكونت</button>
            <div style={{display:"grid",gap:"0.6rem"}}>
              {accs.map(a=>(
                <div key={a.id} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,display:"flex",alignItems:"center",gap:"0.9rem",padding:"0.8rem 0.95rem",flexWrap:"wrap"}}>
                  {a.avatar&&<img src={a.avatar} style={{width:42,height:42,borderRadius:"50%",objectFit:"cover",border:"1px solid rgba(212,165,116,0.2)"}} alt=""/>}

                  <Badge s={a.status}/>
                  <button className="bh" onClick={()=>openAF(a)} style={{padding:"0.32rem 0.7rem",borderRadius:4,border:"1px solid var(--border)",cursor:"pointer",fontWeight:600,fontSize:"0.72rem",fontFamily:"'Cairo',sans-serif",background:"rgba(255,255,255,0.04)",color:"var(--dim)"}}>✏️</button>
                  <button className="bh" onClick={()=>delAcc(a.id)} style={{padding:"0.32rem 0.7rem",borderRadius:4,border:"1px solid rgba(239,68,68,0.2)",cursor:"pointer",fontWeight:600,fontSize:"0.72rem",fontFamily:"'Cairo',sans-serif",background:"rgba(239,68,68,0.06)",color:"#f87171"}}>🗑️</button>
                </div>
              ))}
            </div>
          </>}
          {atab==="offs"&&<>
            <button className="bh" onClick={()=>openOF()} style={{...S.pBtn,marginBottom:"1.1rem"}}>+ أضف عرض</button>
            <div style={{display:"grid",gap:"0.6rem"}}>
              {offs.map(o=>{const a=accs.find(x=>x.id===o.accountId);const e=isExp(o.expiryDate),dl=daysLeft(o.expiryDate),urg=!e&&dl!==null&&dl<=3;return(
                <div key={o.id} style={{background:"var(--card)",border:`1px solid ${urg?"rgba(251,191,36,0.3)":e?"rgba(239,68,68,0.2)":"var(--border)"}`,borderRadius:8,display:"flex",alignItems:"center",gap:"0.9rem",padding:"0.8rem 0.95rem",flexWrap:"wrap"}}>

                  <div style={{flex:1,minWidth:120}}>
                    <div style={{fontWeight:700,fontFamily:"'Playfair Display',serif"}}>{o.title}</div>
                    <div style={{fontSize:"0.7rem",color:"var(--hl)"}}>{a?.name||"—"}</div>
                    {o.expiryDate&&<div style={{fontSize:"0.68rem",color:e?"#f87171":urg?"#fbbf24":"#4ade80",fontWeight:urg?700:400}}>{e?"✗ منتهي":urg?"⚠️ باقي "+dl+" يوم":"⏳ "+dl+" يوم"}</div>}
                  </div>
                  <button className="bh" onClick={()=>openOF(o)} style={{padding:"0.32rem 0.7rem",borderRadius:4,border:"1px solid var(--border)",cursor:"pointer",fontWeight:600,fontSize:"0.72rem",fontFamily:"'Cairo',sans-serif",background:"rgba(255,255,255,0.04)",color:"var(--dim)"}}>✏️</button>
                  <button className="bh" onClick={()=>delOff(o.id)} style={{padding:"0.32rem 0.7rem",borderRadius:4,border:"1px solid rgba(239,68,68,0.2)",cursor:"pointer",fontWeight:600,fontSize:"0.72rem",fontFamily:"'Cairo',sans-serif",background:"rgba(239,68,68,0.06)",color:"#f87171"}}>🗑️</button>
                </div>
              );})}
            </div>
          </>}
        </div>

      {selA&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:"1rem"}} onClick={closeAcc}>
          <div style={{background:"#0f0f0f",border:"1px solid rgba(212,165,116,0.15)",borderRadius:12,padding:"1.4rem",width:"100%",maxWidth:580,maxHeight:"88vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            {selA.coverImage&&<img src={selA.coverImage} style={{width:"100%",height:170,objectFit:"cover",borderRadius:8,marginBottom:"0.9rem"}} alt=""/>}
            <div style={{display:"flex",gap:"0.9rem",alignItems:"center",marginBottom:"0.9rem"}}>
              {selA.avatar&&<img src={selA.avatar} style={{width:58,height:58,borderRadius:"50%",border:"2px solid var(--hl)",objectFit:"cover"}} alt=""/>}
              <div style={{flex:1}}>

                <div style={{color:"var(--dim)",fontSize:"0.72rem"}}>{selA.category}{selA.joinedDate&&" · انضم "+selA.joinedDate}</div>
              </div>
              <button onClick={e=>shareAcc(selA,e)} title="شارك الأكونت"
                style={{background:"rgba(212,165,116,0.08)",border:"1px solid rgba(212,165,116,0.25)",color:"var(--hl)",padding:"0.32rem 0.7rem",borderRadius:6,cursor:"pointer",fontSize:"0.75rem",fontWeight:600,fontFamily:"'Cairo',sans-serif",display:"flex",alignItems:"center",gap:"0.3rem"}}>
                🔗 شارك

            </div>
            <div style={{color:"var(--dim)",lineHeight:1.7,marginBottom:"0.9rem",fontSize:"0.86rem"}}>{selA.description}</div>
            {selA.links?.length>0&&<div style={{marginBottom:"0.9rem"}}><div style={{fontWeight:600,marginBottom:"0.4rem",fontSize:"0.72rem",letterSpacing:"0.08em",textTransform:"uppercase",color:"var(--dim)"}}>اللينكات</div>{selA.links.map(l=><Lnk key={l.label} l={l}/>)}</div>}
            {(selA.fixedReply||selA.timesReply||selA.contactReply)&&(
              <div style={{marginBottom:"0.9rem"}}>
                <div style={{fontWeight:600,marginBottom:"0.7rem",fontSize:"0.72rem",letterSpacing:"0.08em",textTransform:"uppercase",color:"var(--dim)"}}>الردود الجاهزة</div>
                <div style={{display:"grid",gap:"0.55rem"}}>
                  {selA.fixedReply&&(<div style={{background:"rgba(255,255,255,0.02)",border:"1px solid var(--border)",borderRadius:6,padding:"0.7rem"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.35rem"}}><span style={{fontSize:"0.7rem",color:"var(--hl)",fontWeight:600}}>📌 الرد الثابت</span><CopyBtn text={selA.fixedReply} label="كوبي"/></div><div style={{fontSize:"0.78rem",color:"var(--text)",lineHeight:1.65,whiteSpace:"pre-wrap"}}>{selA.fixedReply}</div></div>)}
                  {selA.timesReply&&(<div style={{background:"rgba(255,255,255,0.02)",border:"1px solid var(--border)",borderRadius:6,padding:"0.7rem"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.35rem"}}><span style={{fontSize:"0.7rem",color:"var(--hl)",fontWeight:600}}>⏰ رد المواعيد</span><CopyBtn text={selA.timesReply} label="كوبي"/></div><div style={{fontSize:"0.78rem",color:"var(--text)",lineHeight:1.65,whiteSpace:"pre-wrap"}}>{selA.timesReply}</div></div>)}
                  {selA.contactReply&&(<div style={{background:"rgba(255,255,255,0.02)",border:"1px solid var(--border)",borderRadius:6,padding:"0.7rem"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.35rem"}}><span style={{fontSize:"0.7rem",color:"var(--hl)",fontWeight:600}}>📞 التواصل</span><CopyBtn text={selA.contactReply} label="كوبي"/></div><div style={{fontSize:"0.78rem",color:"var(--text)",lineHeight:1.65,whiteSpace:"pre-wrap"}}>{selA.contactReply}</div></div>)}
                </div>
              </div>

            {(selA.galleryImages||[]).length>0&&<GalleryView images={selA.galleryImages} accName={selA.name} onZoom={setLightImg}/>}
            {offs.filter(o=>o.accountId===selA.id).length>0&&(
              <div><div style={{fontWeight:600,marginBottom:"0.65rem",fontSize:"0.72rem",letterSpacing:"0.08em",textTransform:"uppercase",color:"var(--dim)"}}>العروض</div><div style={{display:"grid",gap:"0.7rem"}}>{offs.filter(o=>o.accountId===selA.id).map(o=><OCard key={o.id} o={o}/>)}</div></div>
            )}
            <div style={{textAlign:"center",marginTop:"1.3rem"}}><button onClick={closeAcc} style={S.ghost}>إغلاق</button></div>
          </div>
        </div>
      )}

      {/* ACC FORM */}
      {showAF&&(
        <div style={S.modal}>
          <div style={S.box}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.05rem",marginBottom:"1.1rem",color:"var(--hl)"}}>{eAid?"تعديل الأكونت":"أكونت جديد"}</div>
            <Lbl t="اسم الأكونت"/><input placeholder="مثال: شيخ المندي" value={af.name} onChange={e=>setAf({...af,name:e.target.value})} style={S.inp}/>
            <ImgUp label="صورة البروفايل (اختياري)" cur={af.avatar} onDone={u=>setAf(f=>({...f,avatar:u}))}/>
            <ImgUp label="صورة الغلاف (اختياري)" cur={af.coverImage} onDone={u=>setAf(f=>({...f,coverImage:u}))}/>
            <GalleryUp images={af.galleryImages} onChange={imgs=>setAf(f=>({...f,galleryImages:imgs}))}/>
            <div style={{height:"0.6rem"}}/>
            <Lbl t="التاجات (مفصولة بفاصلة)"/><input placeholder="مطاعم, فود" value={af.tags} onChange={e=>setAf({...af,tags:e.target.value})} style={S.inp}/>

              <div style={{fontSize:"0.72rem",color:"var(--hl)",fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"0.7rem"}}>📋 الردود الجاهزة</div>
              <Lbl t="الرد الثابت"/><textarea placeholder="أهلا وسهلا بك في..." value={af.fixedReply} onChange={e=>setAf({...af,fixedReply:e.target.value})} style={{...S.inp,minHeight:80,resize:"vertical"}}/>
              <Lbl t="رد المواعيد"/><textarea placeholder="السبت - الخميس: ١٢ظ - ١٢م" value={af.timesReply} onChange={e=>setAf({...af,timesReply:e.target.value})} style={{...S.inp,minHeight:65,resize:"vertical"}}/>
              <Lbl t="رد التواصل"/><textarea placeholder="واتساب: 01XXXXXXXXX" value={af.contactReply} onChange={e=>setAf({...af,contactReply:e.target.value})} style={{...S.inp,minHeight:65,resize:"vertical"}}/>
            </div>
            <div style={{fontWeight:600,marginBottom:"0.5rem",fontSize:"0.72rem",letterSpacing:"0.08em",textTransform:"uppercase",color:"var(--dim)"}}>اللينكات</div>
            {lnks.map((l,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 2fr 50px 28px",gap:"0.35rem",marginBottom:"0.35rem"}}>
                {["label","url","icon"].map(k=><input key={k} placeholder={k==="label"?"الاسم":k==="url"?"الرابط":"أيقون"} value={l[k]} onChange={e=>{const n=[...lnks];n[i][k]=e.target.value;setLnks(n);}} style={{padding:"0.46rem 0.62rem",borderRadius:6,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.03)",color:"var(--text)",direction:"rtl",fontFamily:"'Cairo',sans-serif",fontSize:"0.82rem"}}/>)}
                <button onClick={()=>setLnks(lnks.filter((_,idx)=>idx!==i))} style={{padding:"0.46rem",borderRadius:6,border:"1px solid rgba(239,68,68,0.2)",background:"rgba(239,68,68,0.06)",color:"#f87171",cursor:"pointer",fontSize:"0.8rem"}}>✕</button>
              </div>
            ))}
            <button onClick={()=>setLnks([...lnks,{label:"",url:"",icon:""}])} style={{padding:"0.26rem 0.72rem",borderRadius:4,border:"1px solid var(--border)",cursor:"pointer",fontWeight:500,fontSize:"0.72rem",fontFamily:"'Cairo',sans-serif",background:"transparent",color:"var(--dim)",marginBottom:"1rem"}}>+ أضف لينك</button>
            <div style={{display:"flex",gap:"0.5rem",justifyContent:"flex-end"}}>
              <button onClick={()=>setShowAF(false)} style={S.ghost}>إلغاء</button>
              <button className="bh" onClick={saveAcc} disabled={busy} style={{...S.pBtn,opacity:busy?0.6:1}}>{busy?"⏳ جاري...":"💾 حفظ"}</button>
            </div>
          </div>
        </div>
      )}

      {/* OFFER FORM */}
      {showOF&&(
        <div style={S.modal}>
          <div style={{...S.box,maxWidth:460}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.05rem",marginBottom:"1.1rem",color:"var(--hl)"}}>{eOid?"تعديل العرض":"عرض جديد"}</div>
            <Lbl t="الأكونت"/><select value={of.accountId} onChange={e=>setOf({...of,accountId:e.target.value})} style={S.sel}><option value="">اختر أكونت</option>{accs.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select>
            <Lbl t="عنوان العرض"/><input placeholder="مثال: عرض رمضان" value={of.title} onChange={e=>setOf({...of,title:e.target.value})} style={S.inp}/>
            <ImgUp label="صورة العرض (اختياري)" cur={of.image} onDone={u=>setOf(f=>({...f,image:u}))}/>
            <Lbl t="رابط العرض (اختياري)"/><input placeholder="https://..." value={of.link} onChange={e=>setOf({...of,link:e.target.value})} style={S.inp}/>
            <Lbl t="تاريخ الانتهاء (اختياري)"/><input type="date" value={of.expiryDate} onChange={e=>setOf({...of,expiryDate:e.target.value})} style={S.inp}/>
            <Lbl t="الباج"/><input placeholder="جديد، محدود" value={of.badge} onChange={e=>setOf({...of,badge:e.target.value})} style={S.inp}/>
            <Lbl t="الوصف القصير (اختياري)"/><textarea value={of.description} onChange={e=>setOf({...of,description:e.target.value})} style={{...S.inp,minHeight:52,resize:"vertical"}}/>
            <Lbl t="المحتوى الكامل"/><textarea placeholder={"للطلبات: 01031751111\nالعنوان: ...\nhttps://maps.app.goo.gl/...\n\n• صينية ولي العهد - ١٢٩٩ ج"} value={of.content||""} onChange={e=>setOf({...of,content:e.target.value})} style={{...S.inp,minHeight:170,resize:"vertical",lineHeight:1.7}}/>
            <div style={{display:"flex",gap:"0.5rem",justifyContent:"flex-end"}}>
              <button onClick={()=>setShowOF(false)} style={S.ghost}>إلغاء</button>
              <button className="bh" onClick={saveOff} disabled={busy} style={{...S.pBtn,opacity:busy?0.6:1}}>{busy?"⏳ جاري...":"💾 حفظ"}</button>
            </div>
          </div>
        </div>
      )}

      {/* EXPLAIN FAB */}
      <button className="explain-fab" onClick={()=>setShowExplain(true)}>
        💡 Explain for me
      </button>

      {/* FOOTER */}
      <div style={{textAlign:"center",padding:"1rem",marginTop:"1rem"}}>
        <div className="made-by">Made by Fares Akram</div>
      </div>

      </> /* end view!=="landing" wrapper */}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
