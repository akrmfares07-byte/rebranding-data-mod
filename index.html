<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--primary:#0a0a0a;--hl:#d4a574;--hld:#b8915f;--text:#e8e8e8;--dim:#a8a8a8;--card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);--safe-bottom:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,0px);}

/* ── Base ── */
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
body{font-family:'Cairo','Work Sans',sans-serif;direction:rtl;background:var(--primary);min-height:100vh;min-height:-webkit-fill-available;color:var(--text);position:relative;overflow-x:hidden;cursor:none;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 50%,rgba(212,165,116,0.05),transparent 50%),radial-gradient(circle at 80% 80%,rgba(212,165,116,0.03),transparent 50%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;opacity:0.022;pointer-events:none;z-index:1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px;}

/* ── Custom Cursor (desktop only) ── */
#cursor,#cursor-ring{display:none;}
@media(pointer:fine){
  body{cursor:none;}
  a,button,label,[role="button"]{cursor:none;}
  input,select,textarea{cursor:text;}
  #cursor{display:block;position:fixed;width:10px;height:10px;background:var(--hl);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .18s,height .18s;mix-blend-mode:difference;}
  #cursor-ring{display:block;position:fixed;width:32px;height:32px;border:1.5px solid rgba(212,165,116,0.45);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);}
  #cursor.ck{width:7px;height:7px;}
  #cursor-ring.ck{width:24px;height:24px;}
}
@media(pointer:coarse){body{cursor:auto;}}

::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:#0a0a0a;}::-webkit-scrollbar-thumb{background:rgba(212,165,116,0.25);border-radius:2px;}
.bh{transition:opacity .18s;}.bh:hover{opacity:.8;}
input,select,textarea{outline:none;font-family:'Cairo',sans-serif;-webkit-appearance:none;border-radius:6px;}

/* ── Animations ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInBg{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.45}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 28px rgba(212,165,116,0.2),0 0 56px rgba(212,165,116,0.05)}50%{box-shadow:0 0 46px rgba(212,165,116,0.32),0 0 90px rgba(212,165,116,0.09)}}
@keyframes floatUp{from{opacity:0;transform:translateY(36px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes skelPulse{0%,100%{opacity:.35}50%{opacity:.6}}
@keyframes pageIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes accordOpen{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
@keyframes waBounce{0%,100%{transform:scale(1)}30%{transform:scale(1.12)}60%{transform:scale(0.95)}}

/* ── Page transitions ── */
.page-enter{animation:pageIn .32s ease both;}

/* ── Cards ── */
.card{transition:transform .22s,box-shadow .22s,border-color .22s;}
@media(hover:hover){.card:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(0,0,0,.52);border-color:var(--hl)!important;}}

/* ── Skeleton ── */
.skel{background:rgba(255,255,255,0.05);border-radius:6px;animation:skelPulse 1.5s ease-in-out infinite;}

/* ── Upload ── */
.upbtn{display:flex;align-items:center;justify-content:center;gap:.45rem;width:100%;padding:.56rem 1rem;border-radius:8px;border:1.5px dashed rgba(212,165,116,0.3);background:rgba(212,165,116,0.03);color:var(--hl);font-family:'Cairo',sans-serif;font-size:.82rem;font-weight:600;margin-bottom:.5rem;transition:all .2s;min-height:44px;}
.upbtn:hover{border-color:var(--hl);background:rgba(212,165,116,0.07);}
.pbar{width:100%;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-bottom:.55rem;overflow:hidden;}
.pbar-in{height:100%;background:var(--hl);transition:width .3s;}

/* ── Copy btn ── */
.cpbtn{display:inline-flex;align-items:center;gap:.28rem;padding:.32rem .8rem;border-radius:6px;border:1px solid rgba(212,165,116,0.22);background:rgba(212,165,116,0.05);color:var(--hl);font-family:'Cairo',sans-serif;font-size:.74rem;font-weight:600;transition:all .18s;min-height:36px;white-space:nowrap;}
.cpbtn:hover{border-color:var(--hl);background:rgba(212,165,116,0.12);}
.cpbtn.done{border-color:#4ade80;color:#4ade80;background:rgba(74,222,128,0.07);}
.cpbtn.sm{padding:.22rem .58rem;font-size:.68rem;min-height:30px;}

/* ── Gallery ── */
.gimg{width:100%;height:110px;object-fit:cover;border-radius:6px;border:1px solid var(--border);transition:transform .2s,border-color .2s;}
@media(hover:hover){.gimg:hover{transform:scale(1.03);border-color:var(--hl);}}
.exp-urgent{animation:pulse 1.5s ease-in-out infinite;}

/* ── Search ── */
.search-wrap{position:relative;flex:1;max-width:340px;}
.search-wrap input{width:100%;padding:0.48rem 1rem 0.48rem 2.4rem;border-radius:22px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--text);font-family:'Cairo',sans-serif;font-size:0.85rem;direction:rtl;min-height:42px;transition:border-color .2s;}
.search-wrap input:focus{border-color:rgba(212,165,116,0.42);}
.search-icon{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);color:var(--dim);font-size:.8rem;pointer-events:none;}

/* ── FAB ── */
.explain-fab{position:fixed;bottom:calc(1.2rem + var(--safe-bottom));left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:.48rem;padding:.58rem 1.3rem;border-radius:30px;border:1px solid rgba(212,165,116,0.3);background:rgba(10,10,10,0.94);color:var(--hl);font-family:'Cairo',sans-serif;font-size:.82rem;font-weight:700;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 4px 24px rgba(0,0,0,.5);transition:all .22s;white-space:nowrap;min-height:42px;}
.explain-fab:hover{background:rgba(212,165,116,0.1);border-color:var(--hl);}

/* ── Explain modal ── */
.explain-section{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:1rem;margin-bottom:.75rem;}
.explain-section h3{color:var(--hl);font-size:.82rem;font-weight:700;margin-bottom:.55rem;letter-spacing:.05em;}
.explain-section p,.explain-section li{font-size:.82rem;color:var(--dim);line-height:1.75;}
.explain-section ul{padding-right:1.2rem;}
.explain-section li{margin-bottom:.28rem;}

/* ── Undo toast ── */
.undo-toast{position:fixed;bottom:calc(4.5rem + var(--safe-bottom));left:50%;transform:translateX(-50%);background:#181818;border:1px solid rgba(212,165,116,0.22);color:var(--text);padding:.55rem 1rem;border-radius:8px;font-family:'Cairo',sans-serif;font-size:.8rem;display:flex;align-items:center;gap:.65rem;z-index:998;animation:slideUp .22s ease;box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap;}

/* ── Made by ── */
.made-by{font-family:'Playfair Display',serif;font-size:.8rem;font-weight:600;background:linear-gradient(90deg,#b8915f,#d4a574,#f0dbb5,#d4a574,#b8915f);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.1em;animation:shimmer 3s linear infinite;}

/* ── Landing ── */
.land-logo{animation:glowPulse 3s ease-in-out infinite;}
.land-ring{position:absolute;border-radius:50%;border:1px solid rgba(212,165,116,0.06);pointer-events:none;}
.land-btn-primary{padding:.85rem 2rem;border-radius:10px;border:none;font-weight:700;font-family:'Cairo',sans-serif;font-size:1rem;background:var(--hl);color:#0a0a0a;transition:all .22s;letter-spacing:.03em;min-height:50px;}
@media(hover:hover){.land-btn-primary:hover{background:var(--hld);transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,165,116,0.35);}}
.land-btn-ghost{padding:.82rem 2rem;border-radius:10px;font-weight:600;font-family:'Cairo',sans-serif;font-size:1rem;background:transparent;color:var(--dim);border:1px solid rgba(255,255,255,0.11);transition:all .22s;min-height:50px;}
@media(hover:hover){.land-btn-ghost:hover{border-color:rgba(212,165,116,0.4);color:var(--hl);transform:translateY(-2px);}}

/* ── Accordion offer ── */
.ocard{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s;margin-bottom:.5rem;}
@media(hover:hover){.ocard:hover{border-color:rgba(212,165,116,0.2);}}
.ocard-head{display:flex;align-items:center;gap:.65rem;padding:.8rem 1rem;user-select:none;min-height:56px;}
@media(hover:hover){.ocard-head:hover{background:rgba(255,255,255,0.02);}}
.ocard-body{animation:accordOpen .2s ease both;}
.ocard.urgent{border-color:rgba(251,191,36,0.32);}
.ocard.expired{border-color:rgba(239,68,68,0.18);opacity:.65;}

/* ── Modal ── */
.modal-box{animation:modalIn .26s ease both;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;z-index:300;padding:1rem;animation:fadeInBg .18s ease;overflow-y:auto;}

/* ── Nav ── */
.nav-bar{background:rgba(8,8,8,0.97);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-bottom:1px solid rgba(255,255,255,0.05);padding:0 1.2rem;padding-top:var(--safe-top);display:flex;align-items:center;justify-content:space-between;height:calc(58px + var(--safe-top));position:sticky;top:0;z-index:50;}

/* ── Tabs ── */
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.6rem;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab-btn{padding:.5rem 1.1rem;border:none;background:transparent;color:var(--dim);font-weight:600;font-size:.78rem;font-family:'Cairo',sans-serif;border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap;min-height:44px;}
.tab-btn.on{color:var(--hl);border-bottom-color:var(--hl);}

/* ── WA error btn ── */
.wa-error-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.65rem 1.4rem;border-radius:10px;border:none;background:#25D366;color:#fff;font-family:'Cairo',sans-serif;font-size:.9rem;font-weight:700;min-height:48px;animation:waBounce 1s ease 1;transition:all .2s;}
@media(hover:hover){.wa-error-btn:hover{background:#1da851;transform:translateY(-1px);}}

/* ── Reminder banner ── */
.reminder-banner{display:flex;align-items:center;gap:.7rem;padding:.8rem 1rem;background:rgba(212,165,116,0.07);border:1px solid rgba(212,165,116,0.2);border-radius:10px;margin-bottom:1.2rem;font-size:.8rem;color:var(--dim);}
.reminder-banner strong{color:var(--hl);}

/* ── Expired admin card ── */
.exp-admin-card{border-color:rgba(239,68,68,0.25)!important;background:rgba(239,68,68,0.03)!important;}

/* ── Multi-reply item ── */
.reply-item{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:.75rem;margin-bottom:.5rem;}
.reply-item-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;}


/* ── Hover Preview ── */
.acc-preview{position:absolute;top:calc(100% + 8px);right:0;width:260px;background:#111;border:1px solid rgba(212,165,116,.22);border-radius:10px;padding:.85rem;z-index:200;box-shadow:0 12px 36px rgba(0,0,0,.7);animation:fadeIn .18s ease;pointer-events:none;}
.acc-preview::before{content:'';position:absolute;top:-6px;right:14px;width:10px;height:10px;background:#111;border-top:1px solid rgba(212,165,116,.22);border-right:1px solid rgba(212,165,116,.22);transform:rotate(-45deg);}

/* ── Pin badge ── */
.pin-badge{position:absolute;top:8px;right:8px;background:var(--hl);color:#0a0a0a;font-size:.55rem;font-weight:900;padding:.12rem .4rem;border-radius:4px;letter-spacing:.06em;text-transform:uppercase;z-index:2;}

/* ── QR Modal ── */
.qr-wrap{background:#fff;border-radius:10px;padding:12px;display:inline-block;}

/* ── ReplyCard (profile board) ── */
.reply-board-card{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:10px;padding:1rem;cursor:pointer;transition:all .2s;}
.reply-board-card:hover{border-color:rgba(212,165,116,.35);background:rgba(212,165,116,.04);}
.reply-board-card.copied{border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.07);box-shadow:0 0 0 2px rgba(74,222,128,.12);}

/* ── Tag clickable ── */
.tag-btn{display:inline-block;padding:.08rem .46rem;border-radius:4px;font-size:.62rem;font-weight:500;background:rgba(212,165,116,.07);color:var(--hl);border:1px solid rgba(212,165,116,.13);margin-left:.26rem;margin-bottom:.26rem;cursor:pointer;transition:all .18s;}
.tag-btn:hover{background:rgba(212,165,116,.18);border-color:var(--hl);}

/* ── Duplicate btn ── */
.dup-btn{padding:.3rem .65rem;border-radius:4px;border:1px solid rgba(212,165,116,.2);font-weight:600;font-size:.72rem;font-family:'Cairo',sans-serif;background:rgba(212,165,116,.05);color:var(--hl);min-height:36px;}

/* ── Smooth counter ── */
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.stat-num{animation:countUp .5s ease both;}

/* ── Swipe hint ── */
@keyframes swipeHint{0%{transform:translateX(0)}40%{transform:translateX(-8px)}70%{transform:translateX(4px)}100%{transform:translateX(0)}}


/* ── Staggered entrance ── */
.s0{animation:floatUp .7s cubic-bezier(.22,1,.36,1) .05s both;}
.s1{animation:floatUp .7s cubic-bezier(.22,1,.36,1) .18s both;}
.s2{animation:floatUp .7s cubic-bezier(.22,1,.36,1) .32s both;}
.s3{animation:floatUp .7s cubic-bezier(.22,1,.36,1) .46s both;}
.s4{animation:floatUp .7s cubic-bezier(.22,1,.36,1) .58s both;}
.s5{animation:floatUp .7s cubic-bezier(.22,1,.36,1) .70s both;}
.s6{animation:floatUp .7s cubic-bezier(.22,1,.36,1) .82s both;}
/* ── Particles canvas ── */
#particles-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.55;}

/* ── Landing preview cards ── */
@keyframes cardFloat{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-10px) rotate(-1.5deg)}}
@keyframes cardFloat2{0%,100%{transform:translateY(0) rotate(1.2deg)}50%{transform:translateY(-7px) rotate(1.2deg)}}
@keyframes cardFloat3{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(0deg)}}
.preview-card-1{animation:cardFloat 4s ease-in-out infinite;}
.preview-card-2{animation:cardFloat2 5s ease-in-out infinite .6s;}
.preview-card-3{animation:cardFloat3 4.5s ease-in-out infinite 1.2s;}

/* ── Tagline typewriter ── */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.tagline-cursor{display:inline-block;width:2px;height:1em;background:var(--hl);margin-right:2px;animation:blink .7s ease-in-out infinite;vertical-align:middle;}

/* ── Latest offer badge ── */
@keyframes newBadgePulse{0%,100%{box-shadow:0 0 0 0 rgba(212,165,116,.4)}70%{box-shadow:0 0 0 8px rgba(212,165,116,0)}}
.new-offer-badge{animation:newBadgePulse 2s ease-in-out infinite;}

/* ── Stat counter animate ── */
@keyframes statPop{0%{opacity:0;transform:scale(.7) translateY(10px)}70%{transform:scale(1.08)}100%{opacity:1;transform:scale(1) translateY(0)}}
.stat-pop{animation:statPop .55s cubic-bezier(.34,1.56,.64,1) both;}

/* ── Scroll indicator ── */
@keyframes scrollBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}
.scroll-indicator{position:absolute;bottom:1.8rem;left:50%;transform:translateX(-50%);animation:scrollBounce 1.8s ease-in-out infinite;color:rgba(212,165,116,.3);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;white-space:nowrap;}

/* ── AI Bot ── */
@keyframes typingDot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.tdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--hl);margin:0 2px;animation:typingDot 1s ease-in-out infinite;}
.tdot:nth-child(2){animation-delay:.18s;}.tdot:nth-child(3){animation-delay:.36s;}
.bot-fab{position:fixed;bottom:calc(1.4rem + var(--safe-bottom));left:1.4rem;z-index:160;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#d4a574,#b8915f);border:none;color:#0a0a0a;font-size:1.35rem;box-shadow:0 4px 22px rgba(212,165,116,.45);transition:all .22s;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.bot-fab:hover{transform:scale(1.09);box-shadow:0 6px 30px rgba(212,165,116,.55);}
.bot-window{position:fixed;bottom:calc(4.8rem + var(--safe-bottom));left:1.4rem;z-index:160;width:calc(100vw - 2.8rem);max-width:420px;background:#0d0d0d;border:1px solid rgba(212,165,116,.25);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.75);animation:slideUp .22s ease;overflow:hidden;display:flex;flex-direction:column;max-height:72vh;}
.bot-head{display:flex;align-items:center;gap:.6rem;padding:.7rem 1rem;background:rgba(212,165,116,.05);border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;}
.bot-msgs{flex:1;overflow-y:auto;padding:.8rem 1rem;display:flex;flex-direction:column;gap:.55rem;}
.bot-bubble-user{align-self:flex-start;background:rgba(212,165,116,.12);border:1px solid rgba(212,165,116,.2);color:var(--text);padding:.48rem .8rem;border-radius:12px 12px 4px 12px;font-size:.82rem;max-width:88%;line-height:1.58;font-family:'Cairo',sans-serif;}
.bot-bubble-ai{align-self:flex-end;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);color:var(--text);padding:.48rem .8rem;border-radius:12px 12px 12px 4px;font-size:.82rem;max-width:92%;line-height:1.65;white-space:pre-wrap;font-family:'Cairo',sans-serif;}
.bot-inp-row{display:flex;gap:.45rem;padding:.6rem .8rem;border-top:1px solid rgba(255,255,255,.05);flex-shrink:0;}

// Desktop cursor
(function(){
  const c=document.getElementById('cursor'),r=document.getElementById('cursor-ring');
  if(!c||!r)return;
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;c.style.left=mx+'px';c.style.top=my+'px';});
  (function loop(){rx+=(mx-rx)*.14;ry+=(my-ry)*.14;r.style.left=rx+'px';r.style.top=ry+'px';requestAnimationFrame(loop);})();
  document.addEventListener('mousedown',()=>{c.classList.add('ck');r.classList.add('ck');});
  document.addEventListener('mouseup',()=>{c.classList.remove('ck');r.classList.remove('ck');});

<script>
(function(){
  const canvas=document.getElementById('particles-canvas');
  if(!canvas)return;
  // Disable particles on mobile to save battery
  if(window.innerWidth<640){canvas.style.display='none';return;}
  const ctx=canvas.getContext('2d');
  let W,H,pts=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  function rand(a,b){return a+Math.random()*(b-a);}
  for(let i=0;i<55;i++){pts.push({x:rand(0,1),y:rand(0,1),vx:rand(-.12,.12),vy:rand(-.08,.08),r:rand(.8,2.2),o:rand(.15,.5)});}
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx/W*1.2;p.y+=p.vy/H*1.2;
      if(p.x<0)p.x=1;if(p.x>1)p.x=0;
      if(p.y<0)p.y=1;if(p.y>1)p.y=0;
      ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(212,165,116,${p.o})`;ctx.fill();
    });
    // draw faint connecting lines
    for(let i=0;i<pts.length;i++){for(let j=i+1;j<pts.length;j++){
      const dx=(pts[i].x-pts[j].x)*W,dy=(pts[i].y-pts[j].y)*H;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<110){ctx.beginPath();ctx.moveTo(pts[i].x*W,pts[i].y*H);ctx.lineTo(pts[j].x*W,pts[j].y*H);ctx.strokeStyle=`rgba(212,165,116,${.06*(1-dist/110)})`;ctx.lineWidth=.6;ctx.stroke();}
    }}
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

<script type="text/babel">
const{useState,useEffect,useRef,useMemo,useCallback}=React;
const ADMIN="fares2388";

const WA=window.WA_NUMBER;
const BACKUP_REMINDER_KEY="rb_last_backup";

/* ── Helpers ── */
function daysLeft(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/86400000);}
function isExp(d){if(!d)return false;return new Date(d)<new Date();}
function fmtDate(d){if(!d)return"";return new Date(d).toLocaleDateString("ar-EG");}

async function downloadImg(url,filename){
  try{
    // For Cloudinary URLs, add fl_attachment for direct download
    let dlUrl=url;
    if(url&&url.includes("cloudinary.com")){
      dlUrl=url.replace("/upload/","/upload/fl_attachment/");
    }
    const res=await fetch(dlUrl,{mode:"cors"});
    if(!res.ok)throw new Error("fetch failed");
    const blob=await res.blob();
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=filename||"image.jpg";
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(a.href);},200);
  }catch(e){
    // Fallback: open in new tab so user can long-press save
    window.open(url,"_blank");
  }
}
async function downloadAllAsZip(urls,accName,setZipping){
  setZipping(true);
  try{const zip=new JSZip();const folder=zip.folder(accName||"album");
    for(let i=0;i<urls.length;i++){try{const res=await fetch(urls[i]);const blob=await res.blob();const ext=blob.type.includes("png")?"png":"jpg";folder.file(`${i+1}.${ext}`,blob);}catch(e){}}
    const content=await zip.generateAsync({type:"blob"});const a=document.createElement("a");a.href=URL.createObjectURL(content);a.download=`${accName||"album"}.zip`;a.click();URL.revokeObjectURL(a.href);
  }catch(e){alert("فشل التنزيل");}
  setZipping(false);
}
const CLD_CLOUD="diepkkeyu",CLD_PRESET="rebranding";
async function uploadToCloudinary(file){
  const fd=new FormData();fd.append("file",file);fd.append("upload_preset",CLD_PRESET);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CLD_CLOUD}/image/upload`,{method:"POST",body:fd});
  if(!res.ok)throw new Error("فشل رفع الصورة");
  return (await res.json()).secure_url;
}

// Open WhatsApp with error message
function openWAError(errorMsg){
  const text=encodeURIComponent(`⚠️ عطل في موقع Rebranding:\n${errorMsg}\n\nالوقت: ${new Date().toLocaleString("ar-EG")}`);
  window.open(`https://wa.me/${WA}?text=${text}`,"_blank");
}

// WA expiry notification — send WhatsApp alert for offers expiring within N days
const WA_NOTIF_KEY="rb_wa_notif_sent";
function sendExpiryWAAlerts(offs,accs){
  const today=new Date().toISOString().slice(0,10);
  const sent=JSON.parse(localStorage.getItem(WA_NOTIF_KEY)||"{}");
  const toAlert=offs.filter(o=>{
    if(isExp(o.expiryDate))return false;
    const dl=daysLeft(o.expiryDate);
    if(dl===null||dl>3)return false;
    const key=o.id+"_"+today;
    return !sent[key];
  });
  if(!toAlert.length)return;
  const accMap=Object.fromEntries(accs.map(a=>[a.id,a.name]));
  const lines=toAlert.map(o=>`• ${o.title} (${accMap[o.accountId]||"—"}) — باقي ${daysLeft(o.expiryDate)} يوم`).join("\n");
  const text=encodeURIComponent(`⏰ تنبيه عروض قريبة من الانتهاء:\n${lines}\n\nتاريخ: ${new Date().toLocaleDateString("ar-EG")}`);
  window.open(`https://wa.me/${WA}?text=${text}`,"_blank");
  // Mark as sent
  toAlert.forEach(o=>{sent[o.id+"_"+today]=1;});
  localStorage.setItem(WA_NOTIF_KEY,JSON.stringify(sent));
}

// Backup reminder check
function checkBackupReminder(){
  const last=localStorage.getItem(BACKUP_REMINDER_KEY);
  if(!last)return true;
  const diff=(Date.now()-parseInt(last))/(1000*60*60*24);
  return diff>=7;
}
function markBackupDone(){localStorage.setItem(BACKUP_REMINDER_KEY,Date.now().toString());}

/* ── Image Upload ── */
function ImgUp({label,cur,onDone}){
  const[prev,setPrev]=useState(cur||"");const[pct,setPct]=useState(0);const[busy,setBusy]=useState(false);const fref=useRef();
  async function pick(e){
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();reader.onload=ev=>setPrev(ev.target.result);reader.readAsDataURL(f);
    setBusy(true);setPct(30);
    try{const url=await uploadToCloudinary(f);setPct(100);setPrev(url);onDone(url);}
    catch(err){alert("فشل الرفع: "+err.message);}
    setBusy(false);setPct(0);
  }
  return(
    <div>
      <Lbl t={label}/>
      {prev&&<img src={prev} style={{width:"100%",height:80,objectFit:"cover",borderRadius:6,marginBottom:6,border:"1px solid var(--border)"}} alt=""/>}
      {busy&&<div className="pbar"><div className="pbar-in" style={{width:pct+"%"}}/></div>}
      <label className="upbtn">{busy?"⏳ جاري الرفع...":"☁️ ارفع صورة"}<input ref={fref} type="file" accept="image/*" style={{display:"none"}} onChange={pick} disabled={busy}/></label>

      <input placeholder="https://..." value={prev} onChange={e=>{setPrev(e.target.value);onDone(e.target.value);}} style={S.inp}/>
    </div>
  );
}

          {!o.image&&<div style={{height:".7rem"}}/>}
          {o.description&&<div style={{fontSize:".8rem",color:"var(--dim)",lineHeight:1.65,marginBottom:".55rem"}}>{o.description}</div>}
          {o.content&&(
            <div style={{marginBottom:".6rem",background:"rgba(255,255,255,.02)",borderRadius:6,padding:".75rem",border:"1px solid var(--border)"}}>
              {o.content.split("\n").map((line,i)=>{
                if(!line.trim())return <br key={i}/>;
                const isU=line.trim().startsWith("http");
                const isH=line.trim().startsWith("•")||line.trim().startsWith("-");
                if(isU)return <a key={i} href={line.trim()} target="_blank" rel="noreferrer" style={{display:"block",fontSize:".76rem",color:"var(--hl)",marginBottom:".14rem",wordBreak:"break-all"}}>{line.trim()}</a>;
                if(isH)return <div key={i} style={{fontSize:".78rem",color:"var(--text)",fontWeight:600,marginBottom:".2rem"}}>{line}</div>;
                return <div key={i} style={{fontSize:".76rem",color:"var(--dim)",lineHeight:1.65,marginBottom:".1rem"}}>{line}</div>;
              })}
            </div>
          )}
          <div style={{display:"flex",gap:".5rem",flexWrap:"wrap"}}>
            {o.link&&<a href={o.link} target="_blank" rel="noreferrer" style={{display:"inline-flex",alignItems:"center",gap:".2rem",padding:".28rem .7rem",borderRadius:4,fontSize:".74rem",fontWeight:600,background:"rgba(212,165,116,.07)",border:"1px solid rgba(212,165,116,.2)",color:"var(--hl)",textDecoration:"none",minHeight:36}}>🔗 اعرف أكتر</a>}
            {!e&&<CopyBtn text={copyText} label="كوبي الكل"/>}
          </div>
        </div>
      )}
    </div>
  );
}

          {(a.tags||[]).map(t=>(

            {a.contactReply&&<CopyBtn text={a.contactReply} label="التواصل" small/>}
            {(a.extraReplies||[]).map((r,i)=><CopyBtn key={i} text={r.text} label={r.label||`رد ${i+1}`} small/>)}

          {allReplies.slice(0,3).map((r,i)=>(

      )}

  const contents=[];
  // Inject system as first user message
  contents.push({role:"user",parts:[{text:systemPrompt}]});
  contents.push({role:"model",parts:[{text:"فهمت! أنا جاهز أساعدك. 😊"}]});
  messages.forEach(m=>{
    contents.push({role:m.role==="user"?"user":"model",parts:[{text:m.text}]});
  });
  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents,generationConfig:{maxOutputTokens:500,temperature:0.75}})
  });
  if(!res.ok){const e=await res.json();throw new Error(e?.error?.message||"فشل الاتصال بالبوت");}
  const d=await res.json();
  return d.candidates?.[0]?.content?.parts?.[0]?.text?.trim()||"معنديش رد دلوقتي، جرب تاني.";
}

function buildAllAccsContext(accs, offs){

function PublicBot({accs, offs, onClose}){
  const[msgs,setMsgs]=useState([{role:"ai",text:"أهلاً! 👋 أنا مساعد Rebranding الذكي. عن أنهي أكونت عايز تعرف؟"}]);
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const[selAcc,setSelAcc]=useState(null);
  const msgsRef=useRef();

  useEffect(()=>{if(msgsRef.current)msgsRef.current.scrollTop=msgsRef.current.scrollHeight;},[msgs]);

  async function send(){
    const txt=input.trim();if(!txt||loading)return;
    setInput("");
    const userMsg={role:"user",text:txt};
    const newMsgs=[...msgs,userMsg];
    setMsgs(newMsgs);setLoading(true);
    try{
      let systemPrompt,historyForApi;
      if(selAcc){
        systemPrompt=buildAccContext(selAcc,offs,accs);
        historyForApi=newMsgs.slice(1); // skip intro
      } else {
        // Try to detect which account user is asking about
        const matched=accs.find(a=>(txt+msgs.map(m=>m.text).join(" ")).toLowerCase().includes((a.name||"").toLowerCase()));
        if(matched){
          setSelAcc(matched);
          systemPrompt=buildAccContext(matched,offs,accs);
        } else {
          systemPrompt=buildAllAccsContext(accs,offs);
        }
        historyForApi=newMsgs.slice(1);
      }
      const reply=await askGemini(systemPrompt,historyForApi.map(m=>({role:m.role,text:m.text})));
      setMsgs(prev=>[...prev,{role:"ai",text:reply}]);
    }catch(e){setMsgs(prev=>[...prev,{role:"ai",text:"❌ مشكلة في الاتصال، جرب تاني."}]);}

        </div>

      </div>

      <div className="bot-msgs" ref={msgsRef}>
        {msgs.map((m,i)=>(
          <div key={i} className={m.role==="user"?"bot-bubble-user":"bot-bubble-ai"}
            dangerouslySetInnerHTML={{__html:(m.text||"").replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")}}

        {loading&&<div className="bot-bubble-ai"><span className="tdot"/><span className="tdot"/><span className="tdot"/></div>}

      <div className="bot-inp-row">
        <input className="bot-inp" placeholder="اكتب سؤالك..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} disabled={loading}/>

      </div>
    </div>
  );
}

  const[tagText,setTagText]=React.useState("");
  const[typing,setTyping]=React.useState(true);
  React.useEffect(()=>{
    const full=TAGLINES[tagIdx];
    if(typing){
      if(tagText.length<full.length){const t=setTimeout(()=>setTagText(full.slice(0,tagText.length+1)),60);return()=>clearTimeout(t);}

        {/* Made by */}
        <div className="s6" style={{marginTop:"1.6rem"}}><div className="made-by">Made by Fares Akram</div></div>
      </div>

      {/* Scroll hint */}
      <div className="scroll-indicator">↓ scroll</div>
    </div>
  );
}

/* ══════════════════════
   MULTI-REPLY EDITOR
══════════════════════ */
function MultiReplyEditor({replies,onChange}){
  function add(){onChange([...(replies||[]),{label:"",text:""}]);}
  function remove(i){onChange((replies||[]).filter((_,idx)=>idx!==i));}
  function update(i,k,v){const n=[...(replies||[])];n[i]={...n[i],[k]:v};onChange(n);}
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:".5rem"}}>
        <Lbl t="ردود إضافية (اختياري)"/>
        <button onClick={add} style={{padding:".18rem .55rem",borderRadius:4,border:"1px solid var(--border)",fontSize:".68rem",fontWeight:600,fontFamily:"'Cairo',sans-serif",background:"transparent",color:"var(--hl)",minHeight:28}}>+ إضافة</button>
      </div>
      {(replies||[]).map((r,i)=>(
        <div key={i} className="reply-item">
          <div className="reply-item-head">
            <input placeholder="اسم الرد (مثال: رد VIP)" value={r.label} onChange={e=>update(i,"label",e.target.value)} style={{...S.inp,marginBottom:0,flex:1,marginLeft:".5rem",fontSize:".8rem"}}/>
            <button onClick={()=>remove(i)} style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",color:"#f87171",width:28,height:28,borderRadius:4,fontSize:".8rem",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
          </div>
          <div style={{marginTop:".4rem"}}>
            <textarea placeholder="نص الرد..." value={r.text} onChange={e=>update(i,"text",e.target.value)} style={{...S.inp,minHeight:60,resize:"vertical",marginBottom:0,fontSize:".82rem"}}/>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ══════════════════════
   MAIN APP
══════════════════════ */
function App(){
  const[fbOk,setFbOk]=useState(!!window.__fbReady);
  const[fbError,setFbError]=useState(null);
  const[accs,setAccs]=useState([]);
  const[offs,setOffs]=useState([]);
  const[load,setLoad]=useState(true);
  const[busy,setBusy]=useState(false);
  const[toast,setToast]=useState("");
  const[view,setView]=useState("landing");
  const[admin,setAdmin]=useState(false);
  const[pw,setPw]=useState("");
  const[pwErr,setPwErr]=useState(false);
  const[selA,setSelA]=useState(null);
  const[lightImg,setLightImg]=useState(null);
  const[cat,setCat]=useState("كل شيء");
  const[ptab,setPtab]=useState("accs");
  const[atab,setAtab]=useState("accs");
  const[search,setSearch]=useState("");
  const[sort,setSort]=useState("newest");
  const[showExplain,setShowExplain]=useState(false);
  const[undoData,setUndoData]=useState(null);
  const[showBackupReminder,setShowBackupReminder]=useState(false);
  const[adminSearch,setAdminSearch]=useState("");
  const[renewOffer,setRenewOffer]=useState(null);// offer being renewed
  const[profileAcc,setProfileAcc]=useState(null);// full-page profile (shared link)
  const[showQR,setShowQR]=useState(null);// acc for QR modal
  const[filterPinned,setFilterPinned]=useState(false);
  const[showPublicBot,setShowPublicBot]=useState(false);
  const[showAdminBot,setShowAdminBot]=useState(false);
  const[trainAcc,setTrainAcc]=useState(null);// acc being trained

  // Acc form
  const EA={name:"",category:"مطاعم",avatar:"",coverImage:"",description:"",tags:"",status:"نشط",joinedDate:"",fixedReply:"",timesReply:"",contactReply:"",extraReplies:[],galleryImages:[]};
  const[showAF,setShowAF]=useState(false);
  const[af,setAf]=useState(EA);
  const[eAid,setEAid]=useState(null);
  const[lnks,setLnks]=useState([{label:"",url:"",icon:""}]);

  // Offer form
  const EO={accountId:"",title:"",description:"",content:"",image:"",link:"",expiryDate:"",badge:"جديد"};
  const[showOF,setShowOF]=useState(false);
  const[of,setOf]=useState(EO);
  const[eOid,setEOid]=useState(null);

  // Import state
  const[showImport,setShowImport]=useState(false);
  const[importData,setImportData]=useState(null);
  const importRef=useRef();

  /* ── Firebase init ── */
  useEffect(()=>{
    if(window.__fbReady){setFbOk(true);return;}
    window.addEventListener("fbReady",()=>setFbOk(true),{once:true});
    setTimeout(()=>{if(!window.__fbReady)setFbError("تعذّر الاتصال بقاعدة البيانات. تأكد من الاتصال بالإنترنت وأعد المحاولة.");},10000);
  },[]);

  /* ── Data listeners ── */
  useEffect(()=>{
    if(!fbOk)return;
    const fb=window.__fb;
    let loaded=false;
    const u1=fb.onSnapshot(fb.collection(fb.db,"accounts"),s=>{
      const list=s.docs.map(d=>({...d.data(),id:d.id}));
      setAccs(list);
      if(!loaded){
        loaded=true;setLoad(false);
        const hash=decodeURIComponent(window.location.hash.slice(1));
        if(hash){const found=list.find(a=>a.id===hash||a.name===hash);if(found){setProfileAcc(found);setView("pub");}}
        // Keep profile in sync when data updates
        setProfileAcc(prev=>prev?list.find(a=>a.id===prev.id)||prev:null);
      }
    },err=>{setFbError(err.message);setLoad(false);});
    const u2=fb.onSnapshot(fb.collection(fb.db,"offers"),s=>{const list=s.docs.map(d=>({...d.data(),id:d.id}));setOffs(list);});
    // Backup reminder
    if(checkBackupReminder())setShowBackupReminder(true);
    return()=>{u1();u2();};
  },[fbOk]);

  function msg(t){setToast(t);setTimeout(()=>setToast(""),2800);}

  /* ── Share / deep link ── */
  function shareAcc(a,e){e&&e.stopPropagation();const url=window.location.href.split("#")[0]+"#"+encodeURIComponent(a.id);navigator.clipboard.writeText(url).then(()=>msg("🔗 تم كوبي اللينك!"));}
  // openAcc: inside the site (modal), used by admin modal
  function openAcc(a){setSelA(a);window.location.hash=encodeURIComponent(a.id);}
  function closeAcc(){setSelA(null);history.pushState("","",window.location.pathname+window.location.search);}
  // openProfile: full page (from card click in public view OR from shared link)
  function openProfile(a){setProfileAcc(a);setView("pub");window.location.hash=encodeURIComponent(a.id);}
  function closeProfile(){setProfileAcc(null);history.pushState("","",window.location.pathname+window.location.search);}

  /* ── Undo delete ── */
  function scheduleDelete(type,id,data){
    if(undoData?.timer)clearTimeout(undoData.timer);
    const timer=setTimeout(async()=>{try{await window.__fb.deleteDoc(window.__fb.doc(window.__fb.db,type,id));msg("🗑️ تم الحذف");}catch(e){alert(e.message);}setUndoData(null);},5000);
    setUndoData({type,id,data,timer});
  }
  async function undoDelete(){if(!undoData)return;clearTimeout(undoData.timer);try{const fb=window.__fb;await fb.setDoc(fb.doc(fb.db,undoData.type,undoData.id),undoData.data);msg("↩️ تم الاسترجاع");}catch(e){alert(e.message);}setUndoData(null);}
  function delAcc(id){const data=accs.find(a=>a.id===id);if(!data)return;scheduleDelete("accounts",id,data);}
  function delOff(id){const data=offs.find(o=>o.id===id);if(!data)return;scheduleDelete("offers",id,data);}

  /* ── Renew offer (extend 30 days from now) ── */
  async function doRenewOffer(oId){
    const o=offs.find(x=>x.id===oId);if(!o)return;
    const newDate=new Date();newDate.setDate(newDate.getDate()+30);
    const fb=window.__fb;
    try{await fb.setDoc(fb.doc(fb.db,"offers",oId),{...o,expiryDate:newDate.toISOString().slice(0,10),updatedAt:new Date().toISOString()});msg("✅ تم تجديد العرض 30 يوم");}
    catch(e){alert(e.message);}
    setRenewOffer(null);
  }

  /* ── Export / Import JSON ── */
  function exportJSON(){
    const data={accounts:accs,offers:offs,exportedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`rebranding-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href);
    msg("✅ تم التصدير");markBackupDone();setShowBackupReminder(false);
  }
  function handleImportFile(e){
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{try{const d=JSON.parse(ev.target.result);setImportData(d);setShowImport(true);}catch(err){alert("ملف غير صالح");}};
    reader.readAsText(f);
  }
  async function doImport(){
    if(!importData)return;
    setBusy(true);const fb=window.__fb;
    try{
      for(const a of(importData.accounts||[])){await fb.setDoc(fb.doc(fb.db,"accounts",a.id),a);}
      for(const o of(importData.offers||[])){await fb.setDoc(fb.doc(fb.db,"offers",o.id),o);}
      msg(`✅ تم الاستيراد — ${importData.accounts?.length||0} أكونت، ${importData.offers?.length||0} عرض`);
      setShowImport(false);setImportData(null);
    }catch(e){alert(e.message);}
    setBusy(false);
  }

  /* ── Acc form ── */
  function openAF(a=null){
    if(a){setAf({...a,tags:(a.tags||[]).join(", "),fixedReply:a.fixedReply||"",timesReply:a.timesReply||"",contactReply:a.contactReply||"",extraReplies:a.extraReplies||[],galleryImages:a.galleryImages||[]});setLnks(a.links?.length?a.links:[{label:"",url:"",icon:""}]);setEAid(a.id);}
    else{setAf(EA);setLnks([{label:"",url:"",icon:""}]);setEAid(null);}
    setShowAF(true);
  }
  async function saveAcc(){
    setBusy(true);const fb=window.__fb;const id=eAid||String(Date.now());
    try{await fb.setDoc(fb.doc(fb.db,"accounts",id),{...af,tags:af.tags.split(",").map(t=>t.trim()).filter(Boolean),links:lnks.filter(l=>l.label&&l.url),updatedAt:new Date().toISOString()});msg("✅ تم الحفظ");setShowAF(false);}
    catch(e){alert(e.message);}setBusy(false);
  }

  /* ── Duplicate account ── */
  async function dupAcc(a){
    const fb=window.__fb;
    const newId=String(Date.now());
    const newAcc={...a,id:newId,name:a.name+" (نسخة)",pinned:false,updatedAt:new Date().toISOString()};
    try{await fb.setDoc(fb.doc(fb.db,"accounts",newId),newAcc);msg("✅ تم عمل نسخة من الأكونت");}
    catch(e){alert(e.message);}
  }

  /* ── Toggle pin ── */
  async function togglePin(a){
    const fb=window.__fb;
    try{await fb.setDoc(fb.doc(fb.db,"accounts",a.id),{...a,pinned:!a.pinned,updatedAt:new Date().toISOString()});msg(a.pinned?"📌 تم إلغاء التثبيت":"📌 تم التثبيت");}
    catch(e){alert(e.message);}
  }

  /* ── Save trained QA ── */
  async function saveTrainedQA(a,qas){
    const fb=window.__fb;
    try{
      await fb.setDoc(fb.doc(fb.db,"accounts",a.id),{...a,trainedQA:qas,updatedAt:new Date().toISOString()});
      msg("🤖 تم حفظ التدريب!");
      setTrainAcc(null);
    }catch(e){alert(e.message);}
  }

  /* ── Offer form ── */
  function openOF(o=null){if(o){setOf(o);setEOid(o.id);}else{setOf(EO);setEOid(null);}setShowOF(true);}
  async function saveOff(){
    setBusy(true);const fb=window.__fb;const id=eOid||String(Date.now());
    try{await fb.setDoc(fb.doc(fb.db,"offers",id),{...of,updatedAt:new Date().toISOString()});msg("✅ تم الحفظ");setShowOF(false);}
    catch(e){alert(e.message);}setBusy(false);
  }

  function login(){if(pw===ADMIN){setAdmin(true);setView("admin");setPwErr(false);setPw("");}else setPwErr(true);}

  /* ── Derived data ── */
  const urgentCount=offs.filter(o=>!isExp(o.expiryDate)&&daysLeft(o.expiryDate)!==null&&daysLeft(o.expiryDate)<=3).length;
  const expiredOffs=offs.filter(o=>isExp(o.expiryDate));

  const fAccs=useMemo(()=>{
    let list=cat==="كل شيء"?accs:accs.filter(a=>a.category===cat);
    if(filterPinned)list=list.filter(a=>a.pinned);
    if(search.trim()){const q=search.trim().toLowerCase();list=list.filter(a=>(a.name||"").toLowerCase().includes(q)||(a.description||"").toLowerCase().includes(q)||(a.tags||[]).some(t=>t.toLowerCase().includes(q)));}
    if(sort==="alpha")list=[...list].sort((a,b)=>(a.name||"").localeCompare(b.name||"","ar"));
    else if(sort==="oldest")list=[...list].sort((a,b)=>a.id-b.id);
    else list=[...list].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||b.id-a.id);
    return list;
  },[accs,cat,search,sort,filterPinned]);

  const fOffs=useMemo(()=>{
    // Public: hide expired
    let list=offs.filter(o=>!isExp(o.expiryDate));
    if(search.trim()){const q=search.trim().toLowerCase();list=list.filter(o=>{const an=(accs.find(a=>a.id===o.accountId)?.name||"").toLowerCase();return (o.title||"").toLowerCase().includes(q)||(o.description||"").toLowerCase().includes(q)||an.includes(q);});}
    return list;
  },[offs,accs,search]);

  const NB=(on)=>({padding:".38rem 1rem",borderRadius:4,border:"none",fontWeight:600,fontSize:".76rem",fontFamily:"'Cairo',sans-serif",background:on?"var(--hl)":"rgba(255,255,255,.05)",color:on?"#0a0a0a":"var(--dim)",transition:"all .18s",minHeight:40});

      {/* ── UNDO TOAST ── */}
      {undoData&&<div className="undo-toast"><span>🗑️ سيُحذف بعد 5 ثوان</span><button onClick={undoDelete} style={{background:"var(--hl)",color:"#0a0a0a",border:"none",borderRadius:4,padding:".22rem .65rem",fontWeight:700,fontFamily:"'Cairo',sans-serif",fontSize:".78rem",minHeight:32}}>↩️ Undo</button></div>}

      {/* ── LIGHTBOX ── */}
      {lightImg&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.97)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:500,animation:"fadeInBg .18s ease"}} onClick={()=>setLightImg(null)}><img src={lightImg} style={{maxWidth:"94vw",maxHeight:"88vh",borderRadius:8,objectFit:"contain",animation:"modalIn .22s ease"}} alt=""/></div>}

      {/* ── EXPLAIN MODAL ── */}
      {showExplain&&<ExplainModal onClose={()=>setShowExplain(false)} isAdmin={admin}/>}

      {/* ── RENEW CONFIRM ── */}
      {renewOffer&&(
        <div className="modal-overlay" onClick={()=>setRenewOffer(null)}>
          <div className="modal-box" style={{background:"#111",border:"1px solid rgba(74,222,128,.2)",borderRadius:12,padding:"1.6rem",maxWidth:340,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:"1.8rem",marginBottom:".7rem"}}>🔄</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1rem",marginBottom:".5rem"}}>تجديد العرض</div>
            <div style={{fontSize:".82rem",color:"var(--dim)",lineHeight:1.65,marginBottom:"1.2rem"}}>سيتم مد تاريخ انتهاء العرض <strong style={{color:"var(--text)"}}>{offs.find(o=>o.id===renewOffer)?.title}</strong> لـ 30 يوم من اليوم</div>
            <div style={{display:"flex",gap:".6rem",justifyContent:"center"}}>
              <button onClick={()=>setRenewOffer(null)} style={S.ghost}>إلغاء</button>

      {/* ── IMPORT CONFIRM ── */}
      {showImport&&importData&&(
        <div className="modal-overlay" onClick={()=>setShowImport(false)}>
          <div className="modal-box" style={{background:"#111",border:"1px solid rgba(212,165,116,.2)",borderRadius:12,padding:"1.6rem",maxWidth:380,textAlign:"center"}} onClick={e=>e.stopPropagation()}>

            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1rem",marginBottom:".5rem"}}>استيراد بيانات</div>
            <div style={{fontSize:".82rem",color:"var(--dim)",lineHeight:1.65,marginBottom:".8rem"}}>الملف يحتوي على <strong style={{color:"var(--text)"}}>{importData.accounts?.length||0} أكونت</strong> و<strong style={{color:"var(--text)"}}>{importData.offers?.length||0} عرض</strong></div>
            <div style={{fontSize:".74rem",color:"#fbbf24",background:"rgba(251,191,36,.07)",border:"1px solid rgba(251,191,36,.2)",borderRadius:6,padding:".6rem",marginBottom:"1.1rem"}}>⚠️ سيتم إضافة/تحديث البيانات الموجودة — لن يتم حذف شيء</div>
            <div style={{display:"flex",gap:".6rem",justifyContent:"center"}}>
              <button onClick={()=>setShowImport(false)} style={S.ghost}>إلغاء</button>

          </div>

      {view==="landing"&&<LandingPage accs={accs} offs={offs} onEnter={()=>setView("pub")} onAdmin={()=>setView("login")}/>}

      {view!=="landing"&&<>

        <div style={{display:"flex",alignItems:"center",gap:".7rem"}}>
          <div style={{width:38,height:38,borderRadius:"50%",overflow:"hidden",flexShrink:0,border:"1.5px solid rgba(212,165,116,.42)"}}>
            <img src={LOGO} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="logo" onError={e=>{e.target.style.display="none";e.target.parentNode.style.background="rgba(212,165,116,.1)";e.target.parentNode.innerHTML='<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.95rem;color:#d4a574;font-family:serif">RE</div>';}}/>

          <div className="nav-title"><div style={{fontWeight:700,fontSize:".85rem",letterSpacing:".18em",textTransform:"uppercase",fontFamily:"'Work Sans',sans-serif"}}>Rebranding</div><div style={{fontSize:".48rem",color:"var(--hl)",letterSpacing:".22em",textTransform:"uppercase",marginTop:-1}}>marketing agency</div></div>
        </div>
        <div style={{display:"flex",gap:".3rem",alignItems:"center"}}>
          {urgentCount>0&&<span style={{background:"rgba(251,191,36,.1)",border:"1px solid rgba(251,191,36,.28)",color:"#fbbf24",fontSize:".58rem",fontWeight:700,padding:".08rem .42rem",borderRadius:4}}>⚠️ {urgentCount}</span>}

          <button className="bh" onClick={()=>setView("pub")} style={NB(view==="pub")}>🌐</button>

        </div>
      </nav>

      {/* ═══════════════ PUBLIC ═══════════════ */}
      {view==="pub"&&!profileAcc&&(
        <div className="page-enter" style={{maxWidth:1100,margin:"0 auto",padding:"1.8rem 1.1rem"}}>
          <div style={{textAlign:"center",padding:"2.2rem 1rem 1.8rem",borderBottom:"1px solid var(--border)",marginBottom:"2.2rem"}}>
            <div style={{width:92,height:92,borderRadius:"50%",margin:"0 auto .9rem",overflow:"hidden",border:"2px solid rgba(212,165,116,.38)",boxShadow:"0 0 28px rgba(212,165,116,.12)"}}>
              <img src={LOGO} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="logo"/>
            </div>
            <div style={{fontSize:"1.9rem",fontWeight:700,fontFamily:"'Playfair Display',serif",marginBottom:".2rem"}}>Rebranding</div>
            <div style={{fontSize:".66rem",color:"var(--hl)",letterSpacing:".28em",textTransform:"uppercase",marginBottom:".9rem"}}>marketing agency</div>

              <div style={{textAlign:"center"}}><div style={{fontSize:"1.5rem",fontWeight:700,color:"var(--hl)",fontFamily:"'Playfair Display',serif"}}>{accs.length}</div><div style={{fontSize:".6rem",color:"var(--dim)",letterSpacing:".15em",textTransform:"uppercase"}}>أكونت</div></div>
              <div style={{width:1,background:"var(--border)"}}/>
              <div style={{textAlign:"center"}}><div style={{fontSize:"1.5rem",fontWeight:700,color:"var(--hl)",fontFamily:"'Playfair Display',serif"}}>{offs.filter(o=>!isExp(o.expiryDate)).length}</div><div style={{fontSize:".6rem",color:"var(--dim)",letterSpacing:".15em",textTransform:"uppercase"}}>عرض نشط</div></div>
            </div>
          </div>

          <div className="tab-bar">
            <button className={"tab-btn"+(ptab==="accs"?" on":"")} onClick={()=>setPtab("accs")}>📁 الأكونتات</button>
            <button className={"tab-btn"+(ptab==="offs"?" on":"")} onClick={()=>setPtab("offs")}>{`🎁 العروض${urgentCount>0?" ⚠️":""}`}</button>
          </div>

          <div className="filters-row" style={{display:"flex",gap:".55rem",alignItems:"center",marginBottom:"1.1rem",flexWrap:"wrap"}}>

              </div>
            </div>
            <button onClick={()=>{const url=window.location.href.split("#")[0]+"#"+encodeURIComponent(showQR.id);navigator.clipboard.writeText(url).then(()=>msg("🔗 تم كوبي اللينك!"));}} style={{...S.pBtn,width:"100%",marginBottom:".5rem"}}>🔗 كوبي اللينك</button>
            <button onClick={()=>setShowQR(null)} style={{...S.ghost,width:"100%"}}>إغلاق</button>
          </div>
        </div>
      )}

      {/* ═══════════════ ACC FORM ═══════════════ */}
      {showAF&&(
        <div className="modal-overlay">
          <div className="modal-box" style={S.box}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.05rem",marginBottom:"1rem",color:"var(--hl)"}}>{eAid?"تعديل الأكونت":"أكونت جديد"}</div>
            <Lbl t="اسم الأكونت"/><input placeholder="مثال: شيخ المندي" value={af.name} onChange={e=>setAf({...af,name:e.target.value})} style={S.inp}/>
            <ImgUp label="صورة البروفايل" cur={af.avatar} onDone={u=>setAf(f=>({...f,avatar:u}))}/>
            <ImgUp label="صورة الغلاف" cur={af.coverImage} onDone={u=>setAf(f=>({...f,coverImage:u}))}/>
            <GalleryUp images={af.galleryImages} onChange={imgs=>setAf(f=>({...f,galleryImages:imgs}))}/>
            <div style={{height:".55rem"}}/>
            <Lbl t="التاجات (مفصولة بفاصلة)"/><input placeholder="مطاعم, فود" value={af.tags} onChange={e=>setAf({...af,tags:e.target.value})} style={S.inp}/>
            <Lbl t="الفئة"/><select value={af.category} onChange={e=>setAf({...af,category:e.target.value})} style={S.sel}>{["مطاعم","أخرى"].map(c=><option key={c}>{c}</option>)}</select>
            <Lbl t="الوصف"/><textarea value={af.description} onChange={e=>setAf({...af,description:e.target.value})} style={{...S.inp,minHeight:65,resize:"vertical"}}/>
            <Lbl t="الحالة"/><select value={af.status} onChange={e=>setAf({...af,status:e.target.value})} style={S.sel}><option>نشط</option><option>متوقف</option></select>
            <Lbl t="تاريخ الانضمام (اختياري)"/><input type="date" value={af.joinedDate} onChange={e=>setAf({...af,joinedDate:e.target.value})} style={{...S.inp,marginBottom:".85rem"}}/>

            {/* Replies section */}
            <div style={{borderTop:"1px solid var(--border)",paddingTop:".85rem",marginBottom:".3rem"}}>
              <div style={{fontSize:".72rem",color:"var(--hl)",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",marginBottom:".7rem"}}>📋 الردود الجاهزة</div>
              <Lbl t="الرد الثابت"/><textarea placeholder="أهلا وسهلا..." value={af.fixedReply} onChange={e=>setAf({...af,fixedReply:e.target.value})} style={{...S.inp,minHeight:80,resize:"vertical"}}/>
              <Lbl t="رد المواعيد"/><textarea placeholder="السبت - الخميس: ١٢ظ - ١٢م" value={af.timesReply} onChange={e=>setAf({...af,timesReply:e.target.value})} style={{...S.inp,minHeight:65,resize:"vertical"}}/>
              <Lbl t="رد التواصل"/><textarea placeholder="واتساب: 01XXXXXXXXX" value={af.contactReply} onChange={e=>setAf({...af,contactReply:e.target.value})} style={{...S.inp,minHeight:65,resize:"vertical"}}/>
              <div style={{height:".4rem"}}/>
              <MultiReplyEditor replies={af.extraReplies} onChange={r=>setAf(f=>({...f,extraReplies:r}))}/>
            </div>

            {/* Links */}
            <div style={{borderTop:"1px solid var(--border)",paddingTop:".85rem",marginBottom:".5rem"}}>
              <div style={{fontSize:".72rem",color:"var(--dim)",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",marginBottom:".6rem"}}>اللينكات</div>
              {lnks.map((l,i)=>(
                <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 2fr 46px 30px",gap:".3rem",marginBottom:".32rem"}}>
                  {["label","url","icon"].map(k=><input key={k} placeholder={k==="label"?"الاسم":k==="url"?"الرابط":"أيقون"} value={l[k]} onChange={e=>{const n=[...lnks];n[i][k]=e.target.value;setLnks(n);}} style={{padding:".48rem .62rem",borderRadius:6,border:"1px solid rgba(255,255,255,.08)",background:"rgba(255,255,255,.03)",color:"var(--text)",direction:"rtl",fontFamily:"'Cairo',sans-serif",fontSize:".82rem",minHeight:40}}/>)}
                  <button onClick={()=>setLnks(lnks.filter((_,idx)=>idx!==i))} style={{padding:".46rem",borderRadius:6,border:"1px solid rgba(239,68,68,.2)",background:"rgba(239,68,68,.05)",color:"#f87171",fontSize:".8rem",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                </div>
              ))}
              <button onClick={()=>setLnks([...lnks,{label:"",url:"",icon:""}])} style={{padding:".26rem .7rem",borderRadius:4,border:"1px solid var(--border)",fontWeight:500,fontSize:".72rem",fontFamily:"'Cairo',sans-serif",background:"transparent",color:"var(--dim)",marginBottom:".9rem",minHeight:34}}>+ أضف لينك</button>
            </div>

            <div style={{display:"flex",gap:".5rem",justifyContent:"flex-end"}}>
              <button onClick={()=>setShowAF(false)} style={S.ghost}>إلغاء</button>
              <button className="bh" onClick={saveAcc} disabled={busy} style={{...S.pBtn,opacity:busy?.6:1}}>{busy?"⏳ جاري...":"💾 حفظ"}</button>
            </div>
          </div>
        </div>
      )}

      {/* ═══════════════ OFFER FORM ═══════════════ */}
      {showOF&&(
        <div className="modal-overlay">
          <div className="modal-box" style={{...S.box,maxWidth:460}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.05rem",marginBottom:"1rem",color:"var(--hl)"}}>{eOid?"تعديل العرض":"عرض جديد"}</div>
            <Lbl t="الأكونت"/><select value={of.accountId} onChange={e=>setOf({...of,accountId:e.target.value})} style={S.sel}><option value="">اختر أكونت</option>{accs.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select>
            <Lbl t="عنوان العرض"/><input placeholder="مثال: عرض رمضان" value={of.title} onChange={e=>setOf({...of,title:e.target.value})} style={S.inp}/>
            <ImgUp label="صورة العرض (اختياري)" cur={of.image} onDone={u=>setOf(f=>({...f,image:u}))}/>
            <Lbl t="رابط العرض (اختياري)"/><input placeholder="https://..." value={of.link} onChange={e=>setOf({...of,link:e.target.value})} style={S.inp}/>
            <Lbl t="تاريخ الانتهاء (اختياري)"/><input type="date" value={of.expiryDate} onChange={e=>setOf({...of,expiryDate:e.target.value})} style={S.inp}/>
            <Lbl t="الباج"/><input placeholder="جديد، محدود" value={of.badge} onChange={e=>setOf({...of,badge:e.target.value})} style={S.inp}/>
            <Lbl t="الوصف القصير"/><textarea value={of.description} onChange={e=>setOf({...of,description:e.target.value})} style={{...S.inp,minHeight:52,resize:"vertical"}}/>
            <Lbl t="المحتوى الكامل"/><textarea placeholder={"للطلبات: 01031751111\nالعنوان: ...\nhttps://maps.google.com/...\n\n• صينية - ١٢٩٩ ج"} value={of.content||""} onChange={e=>setOf({...of,content:e.target.value})} style={{...S.inp,minHeight:160,resize:"vertical",lineHeight:1.7}}/>
            <div style={{display:"flex",gap:".5rem",justifyContent:"flex-end"}}>
              <button onClick={()=>setShowOF(false)} style={S.ghost}>إلغاء</button>
              <button className="bh" onClick={saveOff} disabled={busy} style={{...S.pBtn,opacity:busy?.6:1}}>{busy?"⏳ جاري...":"💾 حفظ"}</button>
            </div>
          </div>
        </div>
      )}

      {/* ── EXPLAIN FAB ── */}
      <button className="explain-fab" onClick={()=>setShowExplain(true)}>💡 Explain for me</button>

      {/* ── FOOTER ── */}
      <div style={{textAlign:"center",padding:"1.2rem",marginTop:".5rem"}}>
        <div className="made-by">Made by Fares Akram</div>
      </div>
      </>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
